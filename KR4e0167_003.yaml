body:
  text: 太白山人漫藁卷三明孫一元撰七言古詩松樹障子歌眼底何人畫松樹一株兩株拂煙霧青入石泉形影空老摧嵒壑愁日暮山鬼作靈夭矯行於莵受縛却回顧摩挲雙眼看不真恍然步入廬山路氣寒心悸狂欲踆仰靣大叫真宰怒雷霆排空頃刻成茒堂却被風拔去停杯收卷起長嗟四壁秋聲雨如注畫孔雀引吳溪大絹長十尋何人奪此造化心不寫凡鷹與快鶻獨寫青山石上之文禽髙冠照水弄深碧翠尾隔花浮暗金文章真合自嫵媚雌雄長日青樹林君不見杜陵詩中語意深見詩對畫如見針赤霄𤣥圃須往來慎勿渴飲寒泉隂咄咄行太白山人愁咄咄灑淚盈把眼見骨夜深按劒燈熒熒出門萬里天突兀長江老龍作人語熒惑正照江之滸短衣蒯緱節士歌破屋隂風動環堵蜀之劒閣國西門䝟貐久據揚風塵豎儒幾年秉旄節民命視同鼎中鱗憶昔孝皇養士恩銀章朱紱出入尊白頭至今坐通籍急難誰肯排天閽嗚呼此事難再舉君臣大義從斯􅩹回首欲投煙霧深釣竿獨抱滄溟去酒酣歌贈鄭繼之地官司徒之官不可求早年通籍金閨遊青袍只今厭奔走兒女衣食泣道周屢見文章出翠釡未聞廊廟登天球鄉關萬里望不及風吹離思江花愁野人勸汝早歸來塵埃骯髒難為儔朝廷嬖孽未除盡早晚尚有巴蜀憂冰雪照野驚嵗暮行人烽火多阻修天狼出明東海岸哀凰獨叫西康州酒酣對汝不料事為此長歌歌未休黃山行黃山昔云與天通三十六峯常冥濛晨昏日月轉地中下連滄海沃焦東嘄陽一足啼遠松天雞野岸巢髙風中有靈跡世難窮洞門水簾捲鬱葱五色閃映金銀宫秋風花落青桂叢聞有高人祕其蹤洗藥流出砂泉紅長年兀坐石牀空萬物入手愁化工吾聞此山元氣鍾異人往往時相從苔篇鳥書雲霧封我來啓此心忡忡洞裏韓終倘相逢倒景同佩蒼精龍萬二千年夀無終山中人歌山風日暮吹黃獨山人歸來山中宿白雲萬頃髙映屋山光相對眉髮緑萬物到手吟不足詩草牀頭牛腰束麋鹿相過亦不觸毳袍芒蹻識高躅上皇之時道超俗吾聞不死遊亭毒我今鍊藥山之麓山中之人駕黃鵠劒閣行寄彭濟物總制老子輕裘豪且雄挽弓射龍江水中落日半壁翻江赤巫峽明月啼猿狨中原一髮渺何許峨岷萬里來秋風古云劒閣罪真宰盜賊竊據今無同地生度量固人力全活民命天為忠健兒倒戈喜多夢歸來散馬關之東燕然銅柱亦細事致君堯舜臣之功野夫甘守西山餓再見庶物回冲融庶幾乎再見庶物回冲融松崖歌寄方方伯夀卿吾聞徂徠之山嶻嶭髙萬丈上有古松千尺蟠踞崖之顚白日行天不到地蒼藤翠蔦倒挂相鈎連皴皮剝落根半露偃蓋反走枝相纒下有元精山靈祕流膏入土今千年樵人牧豎不敢伐乃知神物天能全隂崖半夜起蛟蠖哀壑萬里含雲煙世間此木不見用偃蹇獨卧空山前只今大厦將傾圮風雨無庇真堪憐嗚呼安得此木供採用能令四海蒼生重熙然南屏山歌屏之山兮髙且閒雲冥冥兮水潺潺山中人兮古心顔坐白石兮擷翠菅雙鳥忽兮翻飛念塵世兮多違夕陽下兮千里眇悵望兮不歸吳氏雙桂歌吳家軒前有雙桂虬枝曲鐵相交蹉黑飈一夜鬼神㑹天香墮地愁素娥露靄向曉半身濕煙痕翠剝莓苔多邇來更借栽培力開花無數黃金柯君家兄弟好竒古攜我共坐青婆娑月色輕搖白鸞箑秋光浮動金叵羅氣酣耳熱發大叫仰面不怕真宰訶寒蟾無語𤣥兔泣一泓翠影搖山河相看一笑唾壺缺攬筆贈君雙桂歌題梅花贈太守黃子和使君作郡滄洲邊我曽一見神翛然長髯方瞳有仙骨種梅猶記羅浮巔瓊盤鐵曲一萬本茒屋正在春風前寒姿自照日杲杲白鶴下叫青溪煙我歸管領君勿嗔采花拾實還候君南榮老人歌南榮老人睡起晚過午柴門日初轉下牀看山懶不冠山光樹光渾莫辨秋風更覺草堂深鳥雀相馴機事淺平生得處不須書愛雲弄泉歲華晏跨驢遊西山天竺寺秋葉滿林吹亂紅秋光半在山寺中老衲迎門解幽事一見呼我長髯公薰爐相對坐中夕松聲泉韻何冲融獨鶴隔竹向人立欲鳴未鳴幽意同氣酣日落豪思發詩成三繞青桂叢造物小兒玩人世俯仰何必悲無窮布袍斗笠自髙格狂歌醉叫驚山翁歸來明月散林影驢背仰嘯秋山空泛髙士湖有引正德乙亥孟春十四日豫與石川子泛舟西湖時石川子著方山冠豫戴華陽巾被髙士服把酒四望豫顧謂石川子曰昔青蓮居士李白與尚書郎張謂泛沔州南湖因改為郎官湖今日豫與子遊頗追跡前事西湖固可為髙士湖矣石川子一大笑酹酒于湖命豫作詩紀之豫時已爛醉即信口長短成篇不竄易一字我聞唐家李白一世賢郎官之湖至今傳我今與子繼其跡勝事豈許昔人專方冠野服興不淺駕船載酒凌蒼煙千山萬山兩岸如羣龍蜿蜒盡在几席前青山落杯底白日行舟邊黿鼉突兀波面出大魚小魚爭避船君把斗酒我歌扣舷天風下來雲葉翩翩爛醉騎鯨遊崑崙巔春前五日大雪一夜雪飛石徑齊清晨壓我茒屋低小奴開門抱甕出赤腳汲水愁衝泥牆頭飢烏太無賴繞我階上啞啞啼南山黃獨寒無苗長鑱歸來風怒號按察使劉元瑞惠寶劍歌劉侯意氣天下無惠我寶劍來昆吾腰間斜解虎頭綬魚皮纒鞘蒼波粗鑄煉自是神明力歐冶已死風胡徂泰山為砥作平地東海出淬蒼鱗枯星迎寶鍔孤光動赤帝篆文留其膚天地相視忽改色樹木慘怛風號呼空山日暮熊兕走蛟騰鯨駭翻江湖黃雲古壘結不散寒鴟嘯雨愁荒蕪憶昨邊烽接天起關城不守失邊鄙天子憂惶費經理今雖掃逐猶未已國無守臣國之恥劉侯劉侯莫輕擬元也關中豪傑士只今契㑹風塵裏酒酣擊劍哀歌起揚眉結義從此始萬里同行報天子謝鮑山人採松花見寄山人縛屋黃山巔青松萬株盤屋前春風摘取花滿裹逢人遙寄吳門仙吳門仙人身已輕服花更向靈氣生白日獨坐若木下滄海如席龍不鳴昨夢訪君松樹樾赤腳踏雲石苔滑天風颯颯吹欲醒歸來松際留明月錢員外畫小石山歌錢侯畫石大者如踞彪小石犖確如驚虯雲際十峯五峯出白日不動蒼煙浮中有山人煮石處茒屋藏縛青崖幽黃鶴飛來飲丹穴月中桂樹枝相樛錢侯錢侯有仙骨手奪造化與天侔我有仙人九節碧玉杖與侯還訪崑崙十二之蓬丘致道觀看七星檜樹歌海虞山前突兀見古檜眼中氣勢相盤拏上應七耀分布有神㑹地靈千歲儲精華皴皮無文盡剝落老根化石吞泥沙據山􅐑峞映壑􅞛谺身枯溜雨枝黑藏蛇佇立頃刻雲霧遮日落未落山之崖同行觀者皆歎嗟舌捫頸縮無敢譁歸來靈物不可究夜宿撼牀恐龍鬭鮑氏藏書樓歌鮑君藏書十萬軸氣壓石渠吞天祿縹囊緗帙盡古今竹簡蝌蚪驚觸目昔從惠子見多方後聞張華載滿轂唐時世南行祕書豈獨李雍號書簏今於君家盡見之插架堆床動成束我夢化作太乙精手燃青藜訪君屋緯象𤣥文發隱竒夜半風雨衆靈哭嘗聞聚書後必興况是魯齊舊儒族六經行天日月明文章末學厭紛逐鳳衰麟死三千春主持吾道寧無人題古木竹石圖石根拖雨雲腳過老木􅞛谺石欲墮白日抱珥天色微翠葆含吟風勢大山空往來不見人山鳥一聲山竹破當時此畫作者誰湘娥猶泣真宰悲吳偉瀑布圖何人畫此瀑布圖巔崖老樹雲糢糊風前披拂佇玩久筆力乃是江夏吳吳生當世名第一揮毫落紙人莫及骨格老硬神氣清飛濤漱石石欲立懸巖遠勢亦可愛直㵼似是廬山派槲葉瑟瑟天風來晴沙碧嶼蒼茫外美人隔水把瑶草鴻雁雙飛鸂䳵小天寒日暮意無極青石漠漠望中杳我生蹤跡真好竒年來遠結滄洲期眼中見此足幽賞分泉煮石聊自怡黃山歌贈戴仲良吾聞黃山三十六峰青插天懸崖峭壁萬文飛流泉古松盤壑風吼地蒼藤翠蔦白日生雲煙竒石媚幽獨小芝紅欲然若有人兮山之巔烹霞煉石元化旋宇宙入手春無邊有時黃鶴鳴翩躚且吹玉笛桃花前月明相約講重𤣥我來手持青苔篇龍漢之祕心相傳洞中一笑三千年蟠桃圖為鮑氏母夀鮑君寄我蟠桃圖緘書相示來中吳索詩詠圖為母夀牙籖錦軸雲光敷風前披拂佇玩久滄海萬里島嶼孤紫文緗核大於斗此木要與凡植殊春風倒捲綘羅袖酒暈時上紅玉膚雲烘霞蒸光不定一顆不易千明珠昌容緑華駕文鯉王喬琴高乘白鳬摘桃實兮來仙都飄飄蕙帶雲霞襦捧桃獻酒為母夀三千年後遊蓬壺分歲詞去年分嵗東海涯今年分嵗山人家地爐盤礴笑傖父隔座呼酒聲啞啞采餌飣盤出鮮脆還從杯靣分椒花吳儂相向祝如願兒大軒冕田桑麻吾亦不祝亦不嗔但教有酒夀吾身題楊明府山水圖歌楊宰手持山水圖打門過我聲相呼登堂展圖急相示雲煙滿靣秋疏疏畫者何人得天力長風萬里動地急攬衣縮頸不敢前袖中怕有波濤入洞庭之派湘漢分君山一㸃入青雲上有老龍吹笛處月明倣佛清韻聞黃鶴樓前花事闌黃陵廟裏竹隂間沙鷗野鶩殊可樂踏浪翻萍時自還彭蠡兩岸煙樹依中有陶朱釣魚磯飯餐蝦菜常容與手著魚經無是非楊宰楊宰心思聰平生愛畫精天工要令知我歸來處便是圖中陶朱公平崖道人歌道人致身何蕭爽縛屋青崖平如掌年來漫有雲霞想道骨仙風日應長雲裏金支下翠旗夜半猿鶴鳴蕙帳長生木瓢白石樽對月松醪引翠浪浩歌日暮采瑶花大澤空山自來往周舜卿山水圖歌周生初學盛子昭畫手相傳心獨勞後來却擬戴文進落筆開縑分秋毫氣韻浮動意已極挂出滿堂皆動色山腰半掃雲氣橫樹杪瀟瀟天風急瀑布下挂蒼崖間近看頗類匡廬山又見武陵桃更有商嶺芝松間似是黃與綺皓首相從同避時一朝出山回帝力四海爭看歌羽翼至今漢道有光輝對畫感事心歎息周生周生名已著平生所畫亦無數此幅差勝盛與戴高堂白日生煙霧黃山歌黃山嶻嶭幾萬里亂峯如龍矗雲起晨昏日月轉山腰三十六軸盤地底崑崙渤澥氣勢來衡嶽匡廬逺相倚長年冥濛飛煙霞白日雜遝走麋麂玉泉丹砂鍾靈根芝草琅玕長不死中有高人事隱棲縛屋開門亂雲裏崖木野藤時作花澗水泠泠石齒齒牀頭木瓢白石鐺簷頭甕牖烏皮几避世應同尸鄉翁著書還擬鶡冠子我亦乾坤放逸人探竒名山興未已落日長歌招隱詩采藥尋君從此始題張玲畫四時花張子寫生人歎嗟解衣停筆思盤拏金盂倒汁墨痕斜挽回物力春豪奢風前脉脉牡丹芽小草濈濈爭含葩夏榴秋蕖取次花四時㑹有重幃遮不教飛泊委泥沙請子更寫古松丫清隂盤據山人家石鼎煮苓延嵗華西湖山居道人縛屋南山裏西湖正對柴門底藜杖經旬懶出門門前看湖聊爾耳秋風撫掌桂花開坐對白石歌隱士溪翁住近不相知晨昏同飲西湖水環溪釣處為陳憲僉題長樂山水閩中雄諸峯北來開巃嵸一溪發源深莫極環繞却與諸山逢山根倒插溪水碧山靄冥冥溪樹失鴰鶬鸂䳵啼向人四面波光山月出美人有時坐溪邊竹竿裊裊牽春煙腰間笭箵興自好日暮吟對江花前我亦平生稱釣翁十年避地滄溟東他時倘慕三花樹萬里來尋煙霧中太白山人漫藁卷三
