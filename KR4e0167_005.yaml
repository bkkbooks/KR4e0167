  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0167_WYG_005-1a, image: WYG1268/WYG1268-0820a.png}
body:
  text: 太白山人漫藳卷五明孫一元撰五言排律出塞二首夜出漢家城朝來塞上行黃金短匕首白馬縵胡纓瀚海驚傳檄燕山暗住兵妖狐衝隊立燐火隔原明栁拂轅門曙旗翻朔雨晴笑談開爼豆陳列走蛟鯨帳底鐃歌起軍中殺氣橫寧知謝州簿猶是一書生四塞黃雲接西征更北征饑鷹掠地去駿馬跑空鳴出磧河聲咽抱關山勢橫風生聞觱栗月黑見欃槍草際髑髏語雲間獵火明旋炊白登路暗搗黑山營鼓角三邉肅熊羆萬里行提攜玉龍起擬死報明庭贈李將軍征南十八韻上將元知敵全軍用伐謀折衝臨逺服仗鉞下南州天末黃雲暗海門落日愁朱帆開逺浪畫角起中洲號令三軍肅妖氛指日收千山迎劒氣萬里擁蛇矛風急聞哀鴈波翻駭伏虯舟人歌小海幕客盡輕裘羽檄飛前渡艨衝據上流候晴占雉尾厭氣射旄頭馬援收諸洞留侯用一籌驚鱗還自潰窮獸欲何投殺勢奔封豕威聲走怒彪潛兵分部伍歸路扼咽喉尚詐終防變乞降更莫留直須臨獠穴盡擬破蠻酋俘獻君門喜凱還道路謳將軍列茅土四海仰皇猷久雨書悶十四韻窮日閉茅屋雨深境更清楯眉上行蟻牆角卧空罌時序了長句生涯終短檠回風摶野曠新水漲柴荆入夢暮雲碧懷人秋蘚生荒雞啼逺戌山鬼嘯空城袞袞風難定悠悠事屢更關河成阻越盜賊正縱橫看劒哀歌咽銜杯樂意傾紀綱須汲黯諫疏憶匡衡十載居南服同時笑北傖鸑雛饑欲死汗血老無名極目煙波濶回頭布褐輕誓將一竿去吾欲弄滄瀛贈殷近夫靖江二十韻霄漢瞻多士君才滯一方青袍走吏卒白馬照江鄉學與前賢翼名應後輩光文鋒膏鸊鵜政理臥桁楊吳楚瘡痍地乾坤戰伐場孤城危此日哀笛動清商萬里憂南服羣凶睨海疆轒輼防破取號令極飛揚涕為黎元墮心應末俗傷風雲看變合形勝認低昂謀食同雞鶩危身破犬羊農間留武備帝上演天潢喪亂哀孫楚賔朋憶鄭莊獨憐清詠苦每愛劇談長去國煙雲異故園橘柚荒土風猶未習水味只新嘗鳥盡滄波濶天低落日黃子情惟浩蕩吾志正悲凉嵗晏舟檣闕途窮菉葹芳猶懷西北念夢寐耿難忘近夫雨中載酒夜訪夫子多髙逸為官解愛賢衝泥山徑裏訪我桂叢邉不廢清時興還開文酒筵寒枝通宿鵲細雨濕浮煙盤出銀絲鱠詩歌漁父篇草堂元自僻華燭更成妍絶勝習池飲接䍦倒載還送别彭冲老論交非一夕去路惜匆匆鳥盡暮雲碧天低落日空風塵千里别燈火一舟同句得勸杯處春歸吹笛中江山我亦老天地子何窮萬事已殘醉百年終短篷案留青玉在劒蝕土花紅客裏哀王粲戎間識吕䝉昂藏各有意搔首看飛鴻居定慧禪院髙眠雲中寺道路久費攀生涯依老宿幽事逺塵寰窗晴藥裹遍榻靜圖書環殘葉下平阪荒煙翳潺湲懶久厭文字靜多生道顔短童立晚吹野色上柴關境適物已化語忘機自閒門前桂應熟去去秋滿山田園卜居明時有遺逸學稼老田園荷鍤雲千頃歸耕月滿村郊原隨步屧田父共開樽引水蔬成畝編籬花映門竹邉行鳥雀桑下散雞豚晴日行看稼白頭坐弄孫年豐占木德春到驗梅根農事時相較嵗功日自論徴科吏未擾耕鑿俗相敦看結田神社踏歌笑語溫太白山人漫藳卷五
