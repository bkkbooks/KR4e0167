body:
  text: 太白山人漫藳巻八明孫一元撰六言詩雜興三首道在須傳大雅歌長再和建安天馬離渥洼水鳳凰飲砥柱湍河嶽英靈鍾聚星辰躔次依然化作開元二鳥啟鳴大運千年神君衣裳冶雅天人氣韻髙閒題首猶餘甲子瓣香誰拜門間江上日落不聞人語江空喜動鷗羣散髪弄木蘭楫乗風訪洞庭君縱筆二首塵世功收翰墨江上還我形骸笑落風前斗笠小兒拍手攔街細雨年華冉冉髙江木葉青青萬事付釣竿手一生讀種魚經宿華陽洞偶過金陵地肺雲中坐對三峯折得瑶華獨玩月明歸去騎龍七言絶句山人山人住在瀑布西早晩看山情自怡屋下紫芝高一尺無數春風不受吹醉着瓦瓶倒盡醉難醒獨抱漁竿臥晩汀風露滿身呼不起一江流水夢中聽桃源圖溪上春風笑語温溪頭春水漲新痕中原逐鹿人誰是桃葉桃花自一村苦寒行二首半月閉門友朋絶過午下食鳥雀憐風狂高江浪打岸雪壓濕突炊無煙凍雲漏日黄無光野客禁此手足僵急走南村覔春信梅花不見只詩狂夜泊闔閭城欲行未行風力柔吳門挂席夜正幽秋水半汀鷗夢我好山兩岸月隨舟憶王屋山人㡬時不見鹿皮翁囘首碧雲天自空記得去秋新月夜荳花棚下説年豐躭酒野人躭酒難料理十日牀頭作醉狂偶扶藜杖出門去庭草風吹一尺長宿江干宿鳥不移林影静春旗猶颭晩風虛城頭明月夜如水江口小舟人打魚與殷近夫放舟江心對月挂帆半夜受天風白幘髙歌海月中千古閒情誰領畧一杯今與使君同愛竹眼中愛竹只數根他時留取雙文樽除却酒徒與漁父春風長日不開門東坡在蜀時以銀竹尺許裁為雙筒謂之文樽野夫兩山夹湖當城隅何人能過清風廬黄葉抱霜蟪蛄老野夫閉門窮著書白苧詞江上睡鴨煙草肥江南白苧催換衣雨聲四月不知暑過盡櫻桃人未歸晩泊江村半江黄葉飛晴雨萬里長天坐短艘村酒瓦瓶呼渡急石門山月去人高寄青空道人斗酒長歌對夕曛相思無那隔重雲夜来夢到西湖路白石灘頭鶴是君西湖十里飛花送酒巵六橋兒女蹋春詞無人㑹得漁翁意獨立晴湖照影時春日書事欲晴未晴雲日黄美人不来心獨傷漫倚東風數春事桃花梨花飛過牆梅杖㡬㸃氷花尚未消一枝鶴膝凍翹翹夜来夢到相尋處野水斜通白木橋荷巾宓妃乞與波間碧慿仗南風為剪成試着晩凉溪上坐道人真得愛蓮情竹莊為孫用彰題小築閒莊枕水潯繞牆種竹碧森森亂紅吹盡春無㡬借看君家秋一林文徴明為其友人伍君求作山水小幅十年甫成君求出示予因賦絶句繭光墨色喜新増肯作尋常斷壁稱十載獨留阿堵妙畵師誰是顧金陵開樽梅花下候解道士夜深不至童子洗杯惱清夜何處酒徒来更遲梅花相看眼不醉挑燈自誦山人詩毛貞夫叅政别予籠一白鶴與丹書一函見遺即席戲成二首答之奇格踉蹌自少塵白榆花落島中春主人應是浮邱伯不惜仙禽借與人半世徒誇萬巻功埋頭今作蠧魚蟲元知天上多文字雲篆煙書更不同留許天賚宿山中皇極閒窺天地心只容高臥華山隂枕邉鼻息君来候政是人間韶濩音王與時方伯求予製濓溪巾兼作小句贈之角巾一笑有真意雲物相看水石間要得平生二三友天應留取臥青山飲龍井眼底閒雲亂不開偶隨麋鹿入雲来平生於物元無取消受山中水一杯奉和文徵明元日見訪簫鼓迎新節事忙喜驚閒客過山房主人依舊清狂甚笑博梟盧送酒香嘗吳中橘酒戲成大觥落手流香新酴醿葡萄渾失真秪應常在勾吳住要與木奴作主人席上偶成楊花燕子弄春柔醉倚箜篌笑未休依舊清風明月好買船吹笛過滄洲秋夜林屋無人月正明推窻欹枕睡魔輕一秋詩句知多少聽盡瀟瀟葉上聲宿西山韜光菴露下庭空蛄蟪鳴山深不聞長短更天風吹人酒欲醒北斗揷江河半明南窻下芭蕉盛開五月瀟然有秋意道人生意山中足養得芭蕉四五枝儘取幽凉供穏睡還分秋色與新詩竹枝詞二首湖日初明湖水涯門前鵲鳴郎到家折得草花還自喜揷向阿奴雙髻了郎到家時春正忙願郎看蠶奴採桑去年蠶死猶自可今年蠶死愁殺郎林侍御過訪留坐竹下問武夷山水清泉長日漱潺湲豸史峩冠訪竹關自笑道人迂野性相逢先問武夷山春暮門開轣轆東風曉酒熟牀頭無可人聽盡雨聲渾不寐棟花榆莢過殘春漁翁漁翁生長不識字坐對滄江有好懐不用滿船載書畵一篷獨挂酒篘来約鵝湖費閣老明年同遊武夷山因作短歌二首贈别武夷山髙秋意凉雲隂半落松桂蒼青壁無人沿月上蹋船放歌溪水長野鶴照衣来清濆山樹開花留白雲他日移居溪水上道衣同拜武夷君謝方方伯夀卿恵米躭貧自笑山人瘦飽飯還歌方伯賢白石鐺中消嵗月漫炊松火汲清泉中酒閉門一月偶出晩歩戲成小句燕麥花開春亦移道人扶杖下山時獨醒免使漁翁笑捲葉分泉當酒巵讀李世卿大厓文集二首柬乃弟立卿憲長豐芑多才世亦雍文章猶見昔賢風天根悟處梅花早要有江門一老翁杖屨當年誰與從白雲囘首有髙蹤畸人隨化文章在我夢羅浮四百峯訪錢隠君隠君南國舊王孫小築茅堂水竹村我亦江湖陸魯望釣竿獨抱訪柴門西湖門前雲物時来宿沙上鷗羣亦自呼背郭不知有城府矮牀竹樹坐臨湖陽羡山人陽羡山人戴鶡冠偶来白日遊塵寰雲霞一夜忽入夢却騎麋鹿還青山坐竹林精舎髙幘短袍雲霞光扁舟繫纜野籬傍焚香静坐了無語山寺閉門春竹長江南大水歌六首揚子具區波勢連吳門淞泖盡雲煙郎家住處今何地長日挂冠愁不前落日薄山風蹙波天吳九首海雲多茫茫一望愁無那聽妾勸公無渡河日黄抱暈天風號海若鶱騰白浪揺連山浮石来噴雪恰似曲江八月潮郤疑地軸折中流雨倒風翻不肯休飛閣横梁通海氣鳴鷗浴鷺失汀洲海側江翻地不毛崖危石斷日吞潮時聞西北猶巡狩不見東南親射蛟宿雲積霧晝長昏滔日浮山白浪吞空道武皇塞瓠子還須神禹鑿龍門潯陽歌十首半夜煙飛殺氣横水軍攻破九江城天子垂衣正南面殊方逆賊敢稱兵畫艦彫戈兵勢来南康已破九江摧鄱陽㶑灔空愁目廬阜崔嵬作戰臺安慶合圍久莫摧中原保障有奇才半夜縋城三死士艨衝百萬只空廻金陵龍虎帝王基石作城垣江作池此是先皇開國地留都萬載莫輕窺中丞就義身難屈憲副臨危罵未休要令後代看臣節白日行天滄海流潘鵬陷賊翻行説劉李逆謀乃助奸即日爾曹皆殄㓕一時天下愧儒冠兵戈北指犯天閽未到南都勢盡奔一夜玉顔凋後艦珊瑚寳玦泣王孫内官白面坐喧呼盡道能開五石弧臨敵一時皆撲㓕貂璫鐵劵豈應圖王公衆道善提兵伍守臨鋒氣亦横大戰長江看掎角成功今日是書生聞道君王統六師蠻兵百萬羽林兒親征若果臨南徼江水今為飲馬池尋天台山水桃花洞口流水源石梁橋畔古苔存山人遥贈金鵝蕊笑隔雲光無一言除夜短瓶臥壁不盡飽宿火向人還自青明日梅花應作意春風一夜打柴扃彭濟物憲副雨中訪予于吳山三茅觀時予方醉臥分付童子未報佇久馳歸既而馬上戲成一絶見寄聊復奉答頽雲壓山山木黄瓦溝鳴泉簷溜長政惱門前立馬岌須便水底眠知章席上分韻同詠紅梅忌絳雪胭脂丹砂霞色酒暈二首皎皎從来忌太尤司花别處與風流就中根撥無人㑹眼底還將物色求平生正爾擬相親面着無言意更真紅拂敢疑顔色似清風林下謝夫人入天台山留别王河秀才撾鼓發行棹相聞我在人間是離羣天台四萬八千丈遥弄雲泉須憶君歸来望望江山阻且脩歸来泉石漫夷猶黄塵瞥眼無人見輸與寒蟬自管秋殘冬廿八日立春酒捷不堪逢過節天涯霜雪正淪隂百年我亦何為者也費椒盤菜椀心汀上汀上閒雲收未了望中白鳥影留雙乾坤此意何人畫吟到無聲月滿江題文徵明畫春江圖二首過午輕雷風色鮮斷虹迎日破寒煙鷗清沙净宜詩句舊日仙人白下船野樹無人隂自合斷峯隔岸雨猶青鸕鷀鸂䳵留春住正是江南杜若汀書張山人壁尋詩衝雪過山家拄杖鏗鏗石徑斜自笑道人無長物酒壺隨處有梅花戲效汪京兆西湖六首為孫道甫書于湖之南屏山居問林和靖爭孤山孤山君已占多春此日還當讓後人千樹梅花雙舞鶴也須着我白綸巾和靖答不允占斷孤山五百春暗香疎影句猶真六橋煙月春無數元屬梅花舊主人固爭我亦歸来事隠淪山靈已許不須嗔乾坤風月無常主要有當時領畧人和靖怒答鶴化梅枯地自春嵗時伏臘薦芳新蘇公堤在猶從姓能道孤山更屬人解和昔人叢桂歌招隠今日梅花肯見分放鶴開籠亦不惡摳衣長日願從君和靖許分孤山一半西湖十里春無數夫子能來意亦嘉煙水平分相對住一山明月共梅花山居一首僧廉一清過訪作贈過晨睡起髪鬅鬠雨後茅簷樹色増下榻裹巾開藥竈敲門看竹有山僧春日晩風庭院静年芳燕子歸來草正長莫道幽人無一事灌花洗竹一春忙晨起見菊花盛開有懐青田令殷近夫鳥下清晨日色净起開雙户照花幽故人何戀五斗粟不共東籬萬斛舟李叅戎汝盛手持白羽扇見遺口占奉答盛世何勞起臥龍山林鐘鼎道還同直須着我青松下嶺月溪風指顧中長吟落日射江江氣深微雲薄樹生秋隂青山白日足幽事着我長吟萬木林睡起睡起行吟日過午葛巾芒屩水雲間虎頭食肉非吾事要與圖南分華山梨花露華時為洗鉛妝剪剪輕風透越裳深院無人吹玉笛秋千斜搭月如霜梔花若為秋水淡妝成縞袂青裙似有情獨倚西風弄秋影向人無語可憐生偶然成詩詩書伴我真多事雲臥天行意自閒半世論交遍天下眼中惟覺有青山謝安東山已慰蒼生望别墅風流太傅遊醉後猶傳青海舞白雞夢斷已千秋陶潛江山萬里雲無色歸去柴桑日已斜風景滿前非故物東籬采采獨黄花林逋開籠放鶴空山裏巖畔梅花野興孤天子當時重封禪西湖合着老林逋題美人圖六首鬭草草色風晴綠滿坡佳人拾翠衆相過衣裳帶得芳鮮氣一笑歸来春意多圍棊棊局當窻笑語清鴈行雲陣各縱横緗簾疎簟無人見庭鶴時驚落子聲鞦韆花下羅裳映縠文鞦韆彩架簇春雲回頭偶道金釵落深院風清笑語聞蹴踘宋祖英雄靖海疆蹴戎猶自意難忘春風别苑三千處教得宫中此藝長彈琴翠翹雲髻有風儀坐弄瑶琴日影移性格聰明誰第一辨絃應似蔡文姬題詩花影亭亭日滿堦鳳箋象管句新裁因風栁絮真堪擬誰有當年道韞才睡起效趙子昻小窻酒醒夕陽低草色撩人思欲迷曵杖起来出門去山櫻子落竹雞啼秋夜渡江西風吹鬢綠䰐鬖擊榜長歌酒半酣野月上船燈影亂載將秋思過江南春曉薄曉鳩聲初睡起山光半落竹門開清風茗椀蒲團静細雨春盤菜甲堆詩成短几兀言情自㑹一詩才就夜三更燈青火冷不成夢殘葉打窻送雨聲太白山人漫藁巻八
