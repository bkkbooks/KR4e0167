body:
  text: 太白山人漫藁巻二明孫一元撰五言古詩雜感八首白日下悲泉瑟瑟寒風鳴羣芳悴中野豈不懷孤英㝠運有興没主者亦何情朅來南榮趎還當抱此生棘岡生廣庭出入良嶮巇鸑鷟不遐顧崑崙安可期偪側居人世感此末歲悲去去勿復道悠悠祗自知太古固無言有言淳朴喪詩書已失眞龍馬終成象身生羲皇後心在羲皇上萬事多變遷真宰自無恙中古造無射耗財空備器元聲未擬和佞言滿朝市所以百年來戎馬無糞地畎畝事征伐土風轉頽至安得虞舜絃為我理六氣大道無狹邪全德萬物備白日浴咸池悠然㑹此意熠燿爭微光鷾鴯矜小智欲辨已忘言滄溟浩無際抱易住青山長日青山對煙雲散不收晨昏變竒態應知住山心不在萬物内乾坤古神器機運誰謝代以道獵衆能兀兀意獨在歸來南郭翁天根同一嘅昔年雲中士被褐離塵表相逢契夙心結我平生好臨別海門東贈以𤣥芝草殷勤再致辭敎夀浮丘老至今不敢遺終身願持保但恐風雪深與時同枯槁齊州赴宿諾滄海歸茒廬浴髪清泠中沙月動影虚天風颯然來吹我白莵裾手持古松枝朗讀鶴背書輕身鍊五芽去與元化俱江上逢春感興嚴雪散寒雨堅冰開積霃青陽變脩條東風回舊林節物感孤志連翩春江潯椒花遠自媚清尊强費斟十年一被褐百回結塵襟豈無鄉闗念所愧國士心開匣撫神物牀頭流泉音㝠運誠嶮巇履兹思何深不徒一朝奮要在萬物任清詩繼絶響聊此抱膝吟遠逰海水照髯影天風吹角巾早年負竒好五嶽散閒身日觀倚高寒車箱夢猶眞一笑謝塵世採藥青澗濵偶來不解事長句驚四垠㡬年聞格鬭中原白骨新山鬼夜啼血層雲愁高旻青鳳叫孤月茫茫鼎湖春攀髯不可得終歲泣遺臣讀高士傳鐘鳴山閣靜晨起自櫛頭霜樹被繁實日出紅欲流稚子裹糗糧下澗汲寒湫焚香開巻帙靜坐法前修因看龎德公鹿門眞可求靖江西浦與殷近夫别離節動青郊高筵敞江濵哀觴為懽酌温念忘客身連山瞰水陸平明眇烟塵清曦升木末長風吹遠津桑麻接上國炎海為南隣生聚豈鹿豕行當逆龍鱗結交非在多要得允衷淳古來豪傑士寄託各有因患難茍相得誰論骨肉親政當篤明愛安可辭苦辛結此園中草炯言懷好春春日吟地偏無往來空庭春正深㑹此淑霽景花木弄繁隂去去散芳躅風來吹我襟意得不能語野鳥酬好音翛然遂忘倦盡力還幽尋纎纎孤月上遲遲白日沉呼來林居子還當期此心東門行晩出東門道停車望眼舒悲風横空來瑟瑟吹我裾芳華盡銷歇杞枳生郊墟我前跑野􅀈我後號山狙無家問樂土八九村疃虛飢民抱子出野哭還趦趄他方尚格鬭盗賊驕有餘四海困轉役人命化為魚有魂招不得剪紙滿溝渠涕下漫霑巾幽懷何時攄與甘泉老人入董㠗山天風下高木寒日墮蒼蒼對坐青崖底卸杖白石傍瓦甌出泉味布袍受松光雲霞有古好芝桂永相將還擕韓終輩去訪蓬山陽訪樵者遠尋山中樵不識山中路隔林伐木聲遥憶林深處不晤竟空歸日墮西陵樹江上餞别友人四章晨起促征鞍薄言駕舟楫送子赴脩河不忍與子别蘭苕㑹摧殘蔦蔓不堪結悽悽情未宣惻惻心欲折心折慿洲渚𤣥雲搆重隂慷慨撫時序况此離别襟嘈嘈佇繁吹戚戚理哀琴暫延林莾間睠此念彌深念深重離筵含酸聽我歌天寒冰澌結君徂當奈何窮獸不出藪倦鳥豈離柯期子早歸來歲晏守山阿山阿遵時晦人文㑹陸沉履運多嶮巇感念昔與今凄風振修薄嚴霜被喬林願言同此夕寤寐思所欽送周用賔進士訪道入少華山有引嘗聞齊人安期生以策干項羽羽不能用欲封之侯不受遂亡去予謂古之仙者往往皆豪傑輩為之友人周用賔棄官訪道入少華山予喜安期生之風感激於斯人因作是詩以送之滄江望不回孤峰晴自立猛虎嘯天風肯為人所縶嘗聞安期生畫策君未入歸來謝煙火清露中天吸千年玩弄間人世風雲集坐此無窮門滅景鍊𤣥汁山中石菖蒲雨過忽開九花喜而盡采食之山中一雨凉窻前曉氣清菖歜忽開花一葉冐九英文石帶淺碧照我几簟明嘗讀古仙傳此草天之精出有靈物䕶時見雲氣成上帝憐我苦服之令長生玉杯收𤣥露采花浮輕盈但覺五情好旋茹毛骨輕便當謝人世去去東蓬瀛種松種松滿崑丘眼中生蒼鱗松根化為石松葉不受塵中有結廬者長年事隱淪入雲荷長鑱斸苓青澗濵木食有竒志乃與天為隣放歌白雲裏去去空山春田舍早春作今辰初解凍遠望田苖稀日出㑹羣情鳥雀相喧飛村婦荷鋤至隔舍烟火微阿童三尺箠驅羊散柴扉風來廣郊陌春事正依依侣魚清池耀明鏡緑萍凈相依水面散寒花樹底風生微主人時夕來釋杖坐苔磯叢石圍小島遊魚吹浪飛眼中銀潑剌鱗光亂斜暉物我澹無言相對兩忘機余亦觀化者願與子同歸收菊花貯枕呼童收落英晨起晞清露滿囊賸貯秋寒香散庭户夜來夢東籬枕上得佳句秋夜同紫峽逸士雪江老僧軰十人宿南屏山中誦逋仙夕寒山翠重秋淨鳥行高分韻賦詩余得夕字荒煙散不收殘山帶遥碧林鵶晩依依草雉時嗝嗝斜光明不定居人掩荆柵朅來喜盍簮林下語幽賾厓屋燈火青野蕨旋新摘豈無伏虎禪亦有飛鳬客愛此小崑丘人世白雲隔願當抱竒幽烱言永終夕江上送殷近夫奉母東歸春色滿汀洲沙晴鸂䳵遊故人別我去回首江之􅑍半月届水宿挂颿風力柔芳蘅㺯遥碧閒雲澹不收逺見蒜山月晩泊瓊花洲推篷慈顔喜得魚沙市頭人生㑹有别歡聚不知憂平明望齊魯乘流發櫂謳我愛陶𢎞景我愛陶𢎞景不受萬乗束挂冠事棲遯歸來卧空谷青山讀玉書白鶴下高木乃知悟恱心長日雲相逐我昔何所夢我昔何所夢所夢在南箕下騎蒼麒麟被髪浴天池日月相磨盪雷電為争馳魚龍舂撞死風雨失所師蒼水使者怒九潦丈人知長跪告丈人臣實愚以􅀈願當謫下土廣輪受譴羈手持青藜杖濩落無所之朝投崑崙巔暮宿渤澥涯腥羶厭塵土所過多魍魑沆瀣不自飽五内常抱飢渾沌日斵䘮顔色非舊時翩翩黄鵠鳥相望不相隨空懐雲錦字無由報歸期王野雲見寄華山誌忽憶余曩昔月下著羽衣醉吟蓮花峯上今已三載自過江南無此豪興喟然而歎作詩寄謝故道及之憶昔遊上清長風吹羽䘸仙人九節笻扶我蓮花側太空借韶濩羣動聲相嚇石髓酌天瓢此物山不惜醉倚洗頭盆月華凝欲滴獨鶴驚夜半回首秋雲碧三年萬里遊此事墮今昔媿謝山中人黙光運闔闢與杭東卿憲副論宋人詩勃興黄九窮妙處空自知坐海不用舲孤嘯三山湄邇來㡬百載還受世人嗤平生陳正字白首不相疑入門坐盤礴知有古畫師紫陽山中徐歩窮壑卧孤松寒風生杖屨幽人獨往來鳥哢自成句因山賸得秋欣然有餘趣片雨弄江光孤雲起汀樹望中水似天嘯坐漁舟去雲居子龍山有高人結茒亂雲裏愛雲不出山自號雲居子晨夕餐雲腴眼中緑筋起十年不見人偶逢青崕底古心仍古顔相看不作禮但問何處來翠靄濕芒屣予亦澹忘言笑拈金鵝蕊程節婦君身椅桐枝妾身葛藟草相感纒綿意永言百世好一朝詎摧傷妾身寧自保生死願從君寸心日杲杲不學浮萍花東西蕩風沼吳興北亭與邦直别青松盤巨壑不受人間塵鸑雛異衆鳥自飲砥柱津羣情貴茍合難以保厥眞吾與夫君交終始道相親同擷雲中草還尋天上春一朝來告别去作上國賔正値歳時暮况與豺虎鄰咽涕重感傷手挽君車輪寒禽各嘯侣落木亦悲辛惟願君歸來卧此清澗濵寄斗笠翁有序予徃年在山陽時有客斗笠短褐訪予於山中因與坐古梅樹下竟日視神氣超然了無酬對一笑不别而去予意甚竒之今年甲戌孟冬八日有逺客至忽寄一詩云憶昔山陽時訪君古梅邊青山不隔雲飛來滿座前風格正堪似氣味亦相連竟日不作語此是象帝先自從别君來想像山月圓恐君為世用墮落天亦憐海上若木枝島中玉禾田引領候君歸寄此黄澤篇乃海門羅先生耳予即惘然感悟作詩從此逝矣徃年斗笠翁相對空山裏坐撫古梅根眼中蒼鱗起景象入無言𤣥㝠乃至理别來經㡬年夢想隔丹嶲昨得白雲詞披覽忽驚喜重感至人心涕下悲未已若木與玉禾一望㡬千里揮手謝塵凡長往從此始高歌碧雲回一劒駕海水聞劉元瑞按察使棄官與甘泉山人候久不至南國有高人棄官萬里道晨夕問音書相候青林杪歳暮悲風塵㑹晤苦不早何日入門來捋鬚傾懷抱東山吳居士況汝平生好朅來同幽棲笑拾金光草三隱逸詩嚴子陵子陵太公流埀釣跡相似一朝載後車尚父任國事陵也帝王師諫議非所志桐江一絲輕煙水從此逝文叔惟故人侯霸乃奴𨽻高踪邈難攀清風滿天地徐孺子刑人㺯神器漢道日將覆羣賢抗大義機露身先戮矯矯南州士雲卧匡山曲髙鴻眷青㝠潛虬媚幽獨朅來世可遺力耕食自足四海弔黄公千里芻一束下榻走陳侯身尊道不辱緬邈有斯人千古仰髙躅陶淵明淵明豪傑人出處亦有道昔讀荆軻詩彷彿見懷抱晉室漸陵夷一官非所好劉裕乃何人天意亦草草歸來卧潯陽甲子紀年號酒乃寓眞情菊也見孤操夢逰黄山吟朝看黄山圖暮夢黄山行手捫天都月一笑雲煙横丈人眉如霜采秀忻相迎酌我以石髓遺我以瓊英泠然跨黄鵠更欲逰空明羣峯忽不見一舉還自驚覺來發長歎半牕松雨鳴曾大尹世榮饋江魚平生味道腴藜莧心自足邑侯念此意遠饋春江玉驚犬吠成羣打門走健僕雪花初出水鸞刀破銀腹風味極不常更倒牀頭醁隔座目力窮到手盃盤速麤糲得解圍吟聲動花竹石川子魯門有狂客昔隱泰山中髙謝九州事自築一畝宫鹿裘才掩骼悟恱晨夕同飲牛汶水湄訪道尸鄉翁物情視蝡動長嘯回天風偶來逰汗漫邂逅瀛海東語笑若宿好顧我啓方瞳授我玉屑飯五内煙火空久當遺凡蛻相將入無窮贈鈍翁豐狐自胥疏每為腋所悞翡翠巢南林亦以文見捕世人玩葩藻投老終莫悟夫子抱清浮以鈍守中素還能逺囂聲朅來隨煙霧予亦畏壘民從子返初歩春日閒居和韋蘇州亂髪午未梳槀居幽興生焚香了清晝無夢到京城雨過山枝緑倚枝有餘情舎南村水滿鵓鳩聲催耕地僻語論稀牀堆圖史清朅來坐成嬾那知世網嬰題許氏夫婦節義夫因為弟死婦乃守夫節一門節義俱聲光繼前哲呱呱膝下兒衣食頼提挈夜窻機杼聲孤燈半明滅白髪映青裙投老志愈烈磊磊澗底松凜凜巖上雪感慨歌此詩燈前聲嗚咽贈别王與時方伯海中三花樹石上五粒松與子今有約相候尋其踪褰衣白雲杪時戲蒼精龍手把古苔篇還訪崑崙峯峰頂嚥𤣥露長令有好容回首謝塵世莫教生秋蓬夢採藥王屋山小有洞夜來何所夢所夢在名山采藥小有洞長鑱亂雲間忽覺異人境已知自不凡青厓貼天日下照芝草斑雙轅駕白虎遥見仙人還向前心自喜飛歩相追攀手把翠雲蓋懇求啓秘闗長日不肯語相待神自閒但教食雲霞要留好容顔一笑還自悟白日逰塵寰首夏一日坐錢員外仕宏竹間小樓戲簡首夏鳴禽繁晏坐竹間樓天風灑琳琅碧雲衣上流焚香了長日短童具茶甌枕簟對青山頓覺五内幽地僻不受塵主人更清修何當拜龎老同入鹿門遊張山人張子湖海士弱齡自崛起讀書法前脩隱棲茒茨底曠哉山水情鶡冠烏皮几巖花紛始紅石耳翠還紫觸物發幽響清詩有妙理遠慮累可輕遺榮心自喜緬邈山中遊百世懐杖履送潘子北上潘子南中秀意氣凌飛鴻出門佩雙鞬告别時匆匆駕言遊燕趙覽光蓬萊宫杖策謁天闕危言開帝聰上以陳王道下以陳民風慷慨抗髙義披肝瀝其衷予亦磈礧士失志岐路中長劒拂鞶厲側睇心冲冲願子茂大猷寤寐思所崇題程時望介齋新安昔上郡黄山秀而起程氏重黎後居此古仁里異代見孤操眼中得吾子結茒山之隈行歌青澗底飲泉義固在飢凍未應恥千載於陵翁可以同此理題汪庸夫孫道甫道義同心巻兩兩澗底松鬱鬱歳寒操青青百尺絲上有女蔓草女蔓不終好一夜風霜老太白山人漫藁巻二
