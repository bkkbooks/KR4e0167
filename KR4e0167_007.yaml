body:
  text: 太白山人漫藁卷七明孫一元撰五言絶句江上沙礫喧寒雨楓根挽釣楂菰蒲起煙火隔水是漁家解衣解衣坐漁梁水風來許許月明不見人幽篁自相語靖江道中落日精靈語空山旅客驚沙寒留鷺影風急走江聲鈎簾鈎簾坐晚吹斗酒娛清暉幽懷未可言木葉不停飛遊吳裋褐心愈壯蒯緱歌自聞薄遊吳王國來尋季子墳孤山誰將一拳石棄此湖水邉老梅盤拏春玩弄到何年相見相見不作語天風吹長鬚探取虎盤囊留贈崑崙圖喜晴鳥鳴隔籬落雨腳上翠微閉門吟正苦客來為解圍睡起睡起散幽躅荒岡春日西野雲飛不起寒壓竹枝低春日遊惠山以老杜一徑野花落孤村春水生衍韻次第得詩十首春色滿三分梅事過其一不有載酒遊白日去更疾茅堂藏山隈尋轉更幽興一鳥浴寒塘數花明小徑石橋斜鬭水竹杖行堪把隔溪鶴如人相看不知野境靜山光合門臨釣石斜老翁抱甕出清曉來灌花半里同井臼數家帶籬落溪翁留白魚社友移新籜向晚意不歇殘陽淡欲無漁榔隔浦斷樵響入雲孤間撫溪邉石坐談竹下門殘霞不作雨逺水欲浮村短策時尋句髙懷自領春山禽莫相避我是住山人卸杖坐松根覔句煙雲裏得意酬青山一掬野泉水歸來吟不了賸有水雲情船頭借漁笛韻中明月生淨業二首薰爐參鼻觀蒲團伴法喜閉門風葉堆半月書不理容成覺么蟲盤特了一句我今無所聞結茅雙松樹秋夜道人晏坐起推窗時一吟白鶴忽不見月明秋滿林雜詠四首夕陽沒中流舟子不停櫓風來未滿帆望斷桃花浦雲容溪上淡木葉山中稀野客青絲屨髙人白板扉霧靄濕空山招提路未分穿林人不見鐘磬却相聞盡日不見魚風髙網罟冷踏船歸未歸江波蕩人影毛應奎副使隱居嚴陵釣臺赴召小詩贈之長風吹去棹萬里客星孤何物為君贈桐江畫作圖秋晚秋晚不扃扉秋亭一葉飛採蓮人不見水面落紅衣永夜黃葉下西阪山空秋正清永夜無人語殘河盡意明避客報客頻勞鶴束書更住山從今松桂裏散髮弄潺湲偶成二首寒日下髙木照見女几山豺虎聲相聞何人當九關䗂蝓鬭未已攻破蚯蚓竅傍有食氣翁抱膝獨長嘯題孫道甫小景五首家近新塘曲月明魚可掬盡夜淡忘歸和雲汀上宿辛苦忘平生雲深出林坂短衣不掩脛行歌落日晚秀色盡堪餐身輕意欲舉日觀倚髙寒排雲與天語茅堂滙溪流一帶清未已萍底山更奇蒼煙飛不起巾杖散髙躅鈎輈啼逺林幽懷春冉冉日暮落花深思賢書院十首青龍橋石梁無病涉杖屨時相逢昔聞橫空霓今見跨水龍清風樓長天帶川原野水映林薄倚欄吟眺餘江日當窗落學禮亭幽亭枕溪流春風敞華牖喤喤聞笙鏞禮筵陳爼豆養蒙館夕隂下松間虛館春風裏夜窗燈火深兒童絃誦喜名宦祠絶代有新祠松篁映林麓嵗時薦江蘺遺愛動民俗鄉賢祠髙議排山嶽典刑猶鄉土我來瞻拜餘花竹映庭户志學堂六經立人極萬古如星日遊居日以深春風羣芳茁卓然亭日夕獨往來花竹靜相對身在萬象間意在萬象外息遊所枕簟對青山琴樽事幽暇日夕宴坐餘庭除雙鳥下漱芳亭芳意滿幽亭石池流水活沙頭羣鷗來檻外雙峯落庚午九月草五日夢中偶得黃落獻晚山楓林有餘景攜鶴上漁舟布袍弄江影題孫道甫明齋致虛本無功輻輻自一轂天根念正微吾以觀其復齋居春日敞柴門春風來小園菜苗隨意長桔橰無時言白鳬白鳬看不足坐買江上舟長日牽春夢江光搖緑洲餐氣開窗見山氣餐之不盈口端在阿堵中笑入無何有濯髮濯髮泉水碧更坐灑天風麋鹿不相避同在此山中夢遊華山半空隔風雨萬壑聞長松我往採三秀騎龍蓮花峯山中來往不逢人家在山深處獨鶴忽飛來風動月中樹晚眺洞庭落日黃虹氣映林薄逺水插山根斷崖傾雲腳即景落篷回風力移舟維石次樹影散平波蟬聲入古寺亂山帶喬木斜日望中碧白雲忽傍人馬首嵐光滴太白山人漫藳卷七
