body:
  text: 太白山人漫藁卷一明孫一元撰古樂府拊劒篇天風揚蓬海水嘯波白日慘光嚴霜被柯一解廣野千里豺虎滋多朝無英雄守土奈何二解余本秦人久客吳中楛矢不忘志念忡忡三解十年無家被褐不完拊劒長視歌聲無歡四解自君之出矣二章自君之出矣冷暖何所依不能見君靣但見篋中衣自君之出矣生死那可知不能保君身但保襁中兒邊人曲燕山風高白草枯月明何處夜吹蘆邊人戍久不忍聽淚濕腰間金僕姑雉子曲麥穗長雉子肥雄啄啄雌依依迎風鼓雙翼吐綬爛錦翬鸑鷟以為儔鷹鸇遠相飛願哺爾雛願戢爾衣不近齊人終無禍機解所佩日本小劒遺殷近夫作公莫舞晴空一夜走白螭河鼓下照寒江湄葛盧之山元氣裂神物將化天有為鐔頭驚見赤花古轆轤純鈎皆莫數千年碧血燐火明萬里隂風髑髏語帝王氣象佳葱葱玉虹提擕行相從座上酒酣公莫舞要是當時隆凖公楊白花簾幕閉重重六宫春已暮金梭萬丈絲不挽楊花住班媫妤紈扇歌初歇開簾草又新如何雙燕子占斷六宫春郎住竹堋口郎住竹堋口妾住楊栁田耎楊栁絲空長不能繫郎船驅車復驅車驅車復驅車起拂車上露願作車後塵逐君車輪去古别離有酒復有酒餞子河梁路離情不可整風亂道旁樹雉子曲二章花葉正田田雉子行哺雛錦翬覆滿身相顧還相呼聖人在位民用和只今四海無網羅花蕚正離離雉子行相求飲啄青山下雌雄鳴且酬四座沉沉動歡酌堂上何人奏此樂吳女詞三章開簾示晷欹剪花金刀冷脉脉情轉深誰牽轆轤綆當窗織錦字拋梭聲咿啞阿弟不肯閒拆我牽牛花燕尾剪空寒花苞才小吐吟成春恨詞隔窗教鸚鵡倦倦林中鳥二章倦倦林中鳥羽毛隨所依風霜太酸苦肯念身不肥倦倦林中鳥一枝聊卑棲鸑鷟不我昆鵂鶹莫我嗤春江曲家在銀塘住微茫隔烟霧春水新生偶沒篙鴨嘴岸崩人不渡問船盡日淡無歸擁衣夜宿青汀露採蓮曲二章越女顔如玉和歌行晚風舉頭乍相識棹入蓮葉中蓮葉翻亂紅正在若耶曲願見隔溪上對坐鬭眉緑太白山人漫藁卷一
