body:
  text: 太白山人漫藳卷六明孫一元撰七言律詩吳興浮碧亭浮碧亭前湖水平拍檻呼酒雙眼明青天不動釣絲捲白魚入手漁舠輕悲風萬里動南紀落日一望搖東瀛沙鷗野鶩少機事道人亦有滄洲情南征南征五月動旌旄瘴靄蠻煙望目勞此日壺漿迎虎旅幾年江海泣弓刀戍樓鵰落風雲壯野日猩啼戰壘髙更喜皇天能悔禍不妨遊子臥江臯滄江千林草樹靜相依來往尋詩坐釣磯地近青春惟鳥雀夜來新水到柴扉中原落日愁多夢萬里滄江定不歸擬向鹿門為地主不妨常著芰荷衣卜居一首柬甘泉山人嵗晚卜居草堂靜長日晏坐人跡稀梅花不開凍雲合雪片忽墮山鵲飛春杯到手何意味江風隔岸吹客衣歸來道路不須問雲谷丈人還可依春來兩月懶不讀書蕭然無一事少喜讀書今懶讀下牀過午頭亂蓬青山滿樓晏坐處落日半江元氣中看花聽鳥了物意尋詩把酒酬春工風前忽自發一笑十年夢落滄洲東得彭濟物總制書白馬行營照暮春風流文采一時尊遼陽燈火夜談劒梁苑詞人今在門聞道經時頭盡白還知百戰氣猶存寄書為慰南州客臥病獨吟江上村辛未中秋攜張逸人僧龍玉升顯東明西湖泛月吹笛飲酒登望湖亭扶醉漫興一望晴煙破暝幽湖天灔灔月初浮旋攜斗酒呼鄰父小有蔬盤上釣舟笛咽水龍中夜冷杯搖河影萬山秋人間回首悲何事欲覽清光最上頭嶽武穆王祠誓死從來建大勳長驅虎旅蕩邊氛中原故舊今餘幾四海相看獨有君吾道千年元氣喪皇圖萬里一江分至今風斷黃龍府鐵馬猶嘶戰後雲蓬窗靜啓蓬窗發孤嘯天風四簷吹晝晴亂石橫泉自經緯幽蘭老桂時爭清詩書端坐了節序山林無事完姓名夜深魍魎向人拜薜荔女蘿衣分明送彭濟物赴闕斗酒長歌賦逺遊客心無賴攬衣裘西風老鴈啼殘夜虛館青燈夢九州一路江山隨指顧萬方時瘼要分憂功成天上歸來日還覔滄浪舊釣儔秋晚登鎮海樓樓上輕雲散女陴樓前狂客獨支頤江當夕照半添色詩與秋山兩鬬奇木葉無言時序暮塵寰多事杖藜知只應又被漁郎笑雨細風斜歸去遲新卜南屏山居石上藤蘿對夕曛解衣長日坐來頻挽回滄海真無計領略青山合有人養鶴似嫌雙口纍為漁又過一生身相逢惟是南屏老獨樹柴門許結鄰山居著野服道人占斷南屏景十里青山帶郭斜對水柴門通鶴渚隔鄰煙火是漁家巖頭老檜占風雨石上昌陽閲嵗華粧㸃太平還著我棕鞋桐帽送生涯江上别吳廷髙約明年同遊嚴陵釣臺一曲離歌日欲晡寒雲漠漠亂蘼蕪晚風江上人初别黃篾樓中酒漫沽凍樹裹花春有迹暮林無葉月平鋪明年凖擬桐江去共訪嚴陵舊釣徒登吳山絶頂望錢塘江潮獨倚危岑岸接䍦晚潮初上練痕齊亂撾鼉鼓妖蛟舞倒捲銀山海日低弓弩千年人去後帆檣萬里望中迷憑誰喚起眉山老為誦錢王廟裏題荒村落日長風吹磧昏荒村寒月動籬門江潮枕上悲心壯山鬼燈前夜語繁亂後客身猶萬里斗間雲氣望中原欲添春水隨行李更聽漁歌起釣䑳同顧九和侍講鄭繼之户部顧與成正郎殷近夫縣令泛太湖作軍中樂酒酣賦詩洞庭秋老翠陂陀景物恢奇望裏過石柱天風回鸛鶴海門波浪見黿鼉帆檣萬里憐漁父鼓角中流和櫂歌獨倚蓬窗渾不醉浮雲西北意如何贈鶴并引殷近夫養二鶴每豫至輒相對舞愛而作詩贈之為愛使君雙舞鶴杖藜相過水雲鄉入門瘦影當窗見隔樹閒行共我長碧海青天憐昨夢朱琴瑶月鬬圓吭他年結屋羅浮上萬樹梅花待汝翔聞江隂解圍喜而獨酌爛醉好音慰我靜風塵漫喜呼兒笑語新夏武有詩歌盛代江山無恙著髙人短蓑月下形應古白酒牀頭計未貧安得盡聞烽火息一瓢長醉太平春中秋夜同吳興凌時東海昌董子言陳用明西湖玩月爛醉歌此十里蒹葭雨盡收西湖一望月光浮野袍白幘同幽事菰米蓮房作好秋波靜龜龍聽醉語夜凉河漢帶漁舟髙情盡在形骸外不用逢人說勝遊與施邦直過南野堂訪陸如昆侍御遊道場山泛碧浪湖臨别書此一笑長髯意已投角巾相對草堂秋看山載酒青藜健籠鶴尋僧盡日遊浮世事多悲去鳥野人道在只滄洲他年寄跡來南墅小結芳鄰水竹幽晚晴獨眺升山絶頂石磴天風笑語清捫蘿直上思猶輕斷虹收雨青山出白鳥弄波斜日明跡學漁樵成久業身隨麋鹿長高情兵戈滿眼真何意只漫蓬蒿過一生避俗避俗年來學養慵惟憐猿鶴日相從閒看流水孤笻往偶與歸樵一徑逢老去形骸無長物清留門户有髙松空教使者求顔闔知入雲山第幾峯遊西湖有引甲戌秋七月十三日李參戎汝盛南征功成著野服訪一元於南屏山中既與掉舟湖上放歌飲酒於渚蒲沙鷗之間盡日樂甚因謂西湖自坡仙逝後五百載無此樂矣今日一元與汝盛有之為作一律以志他日有求其跡者於此亦可見云虎旅將軍功業新也來林下放歌頻幾年天地傷多事此日江湖合有人菱葉亂迎青雀舫波光忽動白綸巾君王若念南征意乞與西湖寄此身十五夜與汝盛泛舟湖中再疊前韻西湖雨過荷氣新船頭對坐言笑頻清樽到手有真意明月墮地延髙人一雙沙鳥忽近座無數巖花吹滿巾兩江事業不須問來伴漁樵終此身陪李參戎汝盛遊勝果寺酒酣登月輪峯望錢塘江潮閒來野寺尋幽事扶醉登臨興更豪山腳遙分雲樹碧海門初上浪花髙坐當落日吟偏壯望入中原首重搔投老要窮奇絶處不妨隨地混漁樵贈徐廷應老翁白首負奇好來往江湖稱地仙野鶩沙鷗各解事青蓴紫鱖寧論錢月明滿地夜呼酒山色半帆秋放船偶過海門訪嘯父相逢各誦雲煙篇烏啼烏啼野樹嵗將暮滿眼菉葹行路艱老我秪應依白墮幾人猶未識青山百年知已長鑱在萬事無心拄杖閒獨倚髙原望明月隔雲黃鶴幾時還和劉元瑞參政夜歸見寄林下輕凉愜素裾雨晴薄暮景偏餘閉門句好香殘後搗藥聲髙月上初世上風塵元自厭山中靜業未全疏他年杖屨來尋我同在羅浮頂上居至日攜搕登道場山瞥眼風塵嵗屢遷椒盤柏酒自留連半生作計閒為上到處論交山最賢好句忽成黃葉寺小舟漫倚白鷗天松聲泉語無人㑹獨坐巖頭意已傳和文徴明除夜見寄節序驚心每憶家小窗無奈客愁賖風前布褐窮難送夢裏江湖鬢未華香滑春盤堆菜甲暖分嵗酒媚椒花浮雲西北應還念坐對寒燈夜畫沙月波樓為陳子魚題危樓溪上倚層空住近仙人白宫浪靜魚龍眠挂影夜凉河漢動秋風鈎簾弄釣滄洲上開檻洗杯清鏡中他日乘舟聽吹笛我來相訪水雲東王與時方伯顧與成參議見訪山中柴門車馬藩侯重下榻髙談盡日歡笑我風流丘壑相對君倒著竹皮冠山中芝草䦨干長石上松隂空翠寒記得晦翁詩句好一川風月要人看秋日簡王與時方伯九月江南風色幽狂歌長日愛林丘酒杯且擬東籬醉汗馬未收西國憂鴻鴈鴛鵝俱自逸蘆花楓葉各知秋眼中今有王夫子曲檻新開看水流春晚歸山中草堂生涯未了烏藤杖裹足茅茨年復年報答清朝渾是句破除塵事總宜眠生來白石仙人分老結碧山學士緣䞉有一裘行帶索等閒懶坐野狐禪送李劒州白甫發船撾鼓使君行望裏連雲棧閣橫此日黎元猶在念十年格鬬喜初平鐵堂峽繞秦山逺玉壘峯連漢水清更喜文翁今在蜀此行須見治功成衡門投老衡門不用名閒雲時伴一身輕牀頭酒盡春剛去座上山青詩又成淺水短蒲蛙閣閣淡煙修竹月盈盈憑誰為問天隨子藥草新生較幾莖秋夜坐吳山僧舍夕隂一抹暗江城入夜星河淺淡明度水煙寒千樹暝隔林雲臥一僧清絡蟲故故催機杼木葉蕭蕭送雨聲獨坐山窗情自㑹燈花無那向人青乙亥元日元日狂歌倒竹樽東風昨夜到柴門生逢盛世憂何事家在青山道自尊殘雪疏林開舊色白沙細浪長新痕春來漫有滄洲興文䳵銀鷀滿釣䑳孟秋十六日孫道甫范文一昆仲邀豫同汪進之京兆方質夫逸人泛舟西湖二首雲移洲渚樹回灣來泛湖光十里閒逸客風流同白幘道人詩句說青山天留晚景平波上鷗落漁家亂竹間此意與君須領略菰蒲明月棹歌還載酒同尋白鷺灣相看一笑意猶閒殘霞隔水宜詩句歸鳥度雲見晚山謝氏賔朋牛者上岑家兄弟渼陂間醉歌小海無人和獨與漁郎泛月還棲雲樓樓上閒雲萬頃漫愛雲長日倚闌干巖花半落嵐光重木葉亂鳴江雨寒野老自甘泉石味兒童時進蕨薇盤閒來更覺青山好湘簟疏簾靜裏看宿歸雲菴沙清竹碧鷗出飛野老候余開石扉暮雲捲雨日初落木葉滿山風乍稀酒杯入夜意自好篝燈向人寒相依窮幽覽勝乃吾事坐愛名山忘獨歸送嚴季祥㑹試逺征此日憐吾子木落蒼山煙霧開挂席獨看淮北月與誰同眺沛中臺上林氷雪愁時暮萬里江湖入夢來此去君門看獻策濟時須用出羣材九日登南屏山漫興南屏九日登臨地望裏風煙秋事幽青蕊娟娟憐物候孤帆裊裊隔江洲秦雲隴樹歸心逺昜水燕山落日愁詩罷長吟還自佇汀鳧沙鴈晚相遊留周用賔宿山中道人訪我西湖間拄杖月明聞扣關焚香下榻夜初靜解衣對坐神自閒眼中君似王摩詰海內我亦元次山短袍髙帽意更逺同來白日遊塵寰仲冬一日聞雷有感仲冬一日忽聞雷無乃皇天號令乖白日風雲時自晦橫江波浪起爭豗千官不見居庸道八駿空馳黃竹哀北望何人經國計野臣孤憤泣蒿萊題倪司諫公在竹裏館使君家在渭川上茅堂正對青琅玕皇陂月出夜初靜紫閣雲連秋映寒已愛冉冉坐中見更要瀟瀟吟處看聞道南鄰有蔣詡攜壺相過日髙談夢鄭繼之不見平生鄭廣文風塵側望隔青雲殊方物色偏憐客兩夜燈花頻夢君隔葉山鳩高自語避人江鸛獨為羣眼中此日堪惆悵塞北音書久未聞孟僉事望之載酒晚訪湖上堆案不愁簿領急青春畫舫載歌行看雲湖上牽清夢對客船頭洗玉觥沙岸行人楓樹黑水樓殘夜月華明追隨此日真髙㑹四海相看意氣橫送少谷子繼之少谷山人去不返洪河素舸坐長空一官臥病菰蒲裏萬里看山煙霧中海內談詩名已動夜深說劒氣還雄關西野客應憐汝君有當年季子風登城漫興獨上荒城望九垠長風吹月到天津蛟鼉浪起全吞楚鳥鼠山空逺見秦嵗月虛驚青瑣夢江湖終要白綸巾不須更道歸來好爛醉樽前軟腳春新築苕溪草堂成白沙翠篠净江潭新築堂成映色寒旋有飛鳬臨釣石即看浴鷺傍清湍扁舟此日鴟夷子木榻經年管幼安長暇南鄰呼酒伴一樽相對坐林巒夜訪吾舍人廷介留酌白首相看笑語同滿樓秋色坐來空瓶開美酒晚留我心到古人今有公一夜好詩燈暈裏十年舊夢雨聲中故山風物渾無恙還結茅茨八九弓遊天竺寺樓閣排空送目勞肩輿到寺步還遙古雷破碣無全面老樹拏崖露半腰盛世不須妝放逸青山政爾要詩豪歸來湖上東風晚帶得芳鮮氣未消贈青城道士新織鷺蓑間紅羽水雲隨處足徜徉傳來彭蠡魚經古見說眉山帽桶長雲冷聽鐘尋野寺月明吹笛過江鄉如今去覔𤣥真子還伴漁郎作醉狂梁溪舟中遇吾廷介廷順昆仲口歌送之吳門北下喜相尋乍見扁舟繫水潯感慨獨收今日淚昻藏同露百年心髙歌醉裏江湖逺白髮燈前夜雨深此去秣陵如憶我逢人還寄敬亭吟次韻答邵國賢少司徒嵗華荏苒坐成暮江南十月葉亂投滄海放身我何意老松閲世天能留虞卿著書只愁思杜陵老病惟孤舟幾年格鬬歸未得隨地看雲藜杖幽吳節婦閨門節義綱常重里巷何人詠竹洲剔目要看同此烈握符須信仰前修杼聲細雨孤燈夜蟲語空堂萬木秋我為題詩重起歎百年風化見皇猷仰則堂為吳孟昌題竹洲洲上有幽居為繼先人結搆初野徑古梅春事舊石池孤月夜光虛當時人去斯名重絶代堂成仰則餘須信乾淳經濟在異時家學有遺書鄭繼之新著小烏巾訪豫作詩戲贈道人相見一笑同烏巾自製誇新工禮數懶慢政著我山林風流今愛公眼前物議一時事溪邉自照雙鬢蓬接䍦倒載間紅羽何當江上尋漁翁望海絶頂天風吹鬢毛長天東去望中遙沙邉煙浪浮珠牡島上人家住翠鰲萬里閒情窮海嶽百年無事只漁樵連翩盡日歸來晚看到潮生月色髙十四夜月下微醺倣邵堯夫首尾吟薄晚微醺對月圓此時意象獨能傳皇王有用從千古魚鳥無言共一天好句忽成幽徑裏春風初到野梅邉襟懷老大元無事薄晚微醺對月圓把酒漫成南窗不作裹足卧出門萬里隨所之寶書長劒豈無意白日髙歌應自奇楊子草𤣥遭客罵杜陵痛飲真吾師百年事業不須問隨地看山笻一枝率溪書院和韻構得茅堂枕石磯矮籬匝匝槿相圍通渠水暖魚知樂隔塢梅開春有機半引短簾供野望漫搜奇句了殘暉階前盡日無人到緑上莓苔幾片衣秋日孤山樓對酒𤣥晏先生不解愁偶來湖上一尋幽健杯到手傾巴峽捷句驚人破蔡州四野秋聲酣晚日半空雲影抱晴樓倚欄遙望歸來處家在青山最上頭重過南屏山白幘長歌湖水隈兩年風物是重來吟邉忽漫乘髙興亭上依然笑舉杯獨樹山花還自照深春江燕故相回尋幽此日真吾事隨意看雲坐石苔有客訪豫南屏山中袖出鐵笛作三弄豫聞而作有客磊落江海情袖中取笛時一鳴初聞浪捲水龍咽靜聽鐵擊珊瑚聲漢戍三秋泣沙磧胡鴈中宵悲月明感時去國意無那折栁落梅能自生檇李城别倪世亨檇李城邉春意動與君半月喜連翩弱條麗蕊看梅栁白髮青樽且嵗年交友晚逢文舉喜諸郎早得仲容賢西歸他日同乘興萬里清江放舸船幽居幽居結搆逺風塵長愛青山老此身隱几忘言真得道閉門却掃不逢人近湖鸛鶴來終日繞屋棕篁青過鄰喚起林逋同載酒六橋風月興猶新贈申將軍制閫薊門青雲鼓角動邉畿白日旌旗赤羽飛直免蒼生憂社稷喜聞天子卸戎衣三秋瀚海風傳檄萬馬燕山夜破圍他日功成憶孫楚江邉來問釣魚磯中秋夜攜諸友澉墅湖泛月望海中秋此地成髙㑹山雨初收澉野隈望裏星河舟楫近坐中滄海酒杯開月明靜抱黿鼉出樹色晴浮島嶼來爛醉狂歌真自得回頭天地莫生哀有感二首簡休陽程世大長吟獨坐思冲冲回首江湖夢寐中石壁青燈懸夜雨山城畫角散天風十年故國憂戎馬萬里音書滯塞鴻避地風煙憐杜老草堂今寄浣花東北風雨雪嵗瀟瀟問舍求田意已勞去國久堪衣佩玦撫時空惜劒吹毛齊東鄭泰名應早鄴下田疇氣自髙回首風塵今萬里側身天地一漁舠幽居小結幽居苕水上坐分沙草地應偏鳴鷗浴鷺春長滿翠木凉雲江可憐白日著書真自適青山招隱不虛傳扁舟亭上時來往獨有侯芭問太𤣥題程世洪棲雲樓樓上閒雲萬頃漫愛雲長日倚䦨干巖花半落嵐光重木葉亂鳴江雨寒野老自甘泉石味兒童時進蕨薇盤閒來更覺青山好湘簟疏簾靜裏看憶鄭繼之年來苦憶鄭夫子獨坐幽林興轉孤皛皛鷗羣回晚日青青菱葉散春湖何時共採金鵝蕊此日君猶銀兔符一笑滄洲終自去那堪風物眼中殊過陳進士遂初湖上草堂盛年射䇿憐吾子早卜茅堂湖水涯臥病滄洲心自得看雲白日首重回鵁鶄鸂䳵柴門近翠石寒沙水葉開作客乾坤吾自放終當同隱白雲隈喜雨驕陽一雨動林臯喜極呼兒破白醪石壁青燈雲色亂草堂叢竹夜聲髙蒼生望嵗心偏切獨客憂時意已勞水滿前湖風日好釣絲十尺弄漁舠草堂溪上高秋雲木凉地偏人事不相妨開門江日流書幌背水秋花照草堂塹北買田時未就舍南種竹已成行幽居自擬王官谷藥褁書籖引興長中秋中秋酒盞聊乘興南國兵戈未息機作客慣看吳地月憂時重泣楚臣衣逺江天入星河濕髙木吟回風露稀一望滄洲終自好百年只漫釣魚磯題范文豫臞菴卷道人黃山梅花仙瘦骨崚嶒神蒼然飲泉坐石幽澗底衣草食木青崖邉汊川風物久作計工部家學猶堪傳夜深兀坐松月靜獨鶴一聲柴菴前夜坐中庭露下濕征裾獨起蒼茫佇望餘河漢夜深人語靜海門潮上月華初盛時去國愁難破看劒燒燈氣未疏三載相看隔南越故山戎馬久無書九日登南屏山漫興客中此日逢佳節扶醉來登千樹林斜日碧雲秋寺淨折荷殘葦晚湖深中原目送雙流淚老馬時存萬里心何處草堂還可借杜陵今有卜居吟李郎中元任過别湖上苦竹泠泠沙雨青秋風别我釣魚汀好持使節朝天子莫道江湖有客星北固雲回山歷歷洪河龍鬭浪冥冥眼中經濟須公等殿上䕫龍有典刑種竹種竹荒岡手記曽滿林蒼翠盡騰凌遙連野水青無間斜壓秋雲冷不勝慣覔漁竿防稚子秪分拄杖與山僧黃陵歌罷無人和明月闌干只自憑太白山人漫藳卷六
