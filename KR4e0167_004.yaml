body:
  text: 太白山人漫藁巻四明孫一元撰五言律詩秋興二首白幘乘高興青山載酒甌登臨歌猛士形勝俯南州龍卧江光晩鵰盤雲色秋西湖有狂客吹笛遍滄洲平野秋光凈廣川落日虛紅留楓樹晩黄見菊花初時序悲舟楫江湖無諫書南山歸卧處還喜有茒廬渡江斗酒醉初醒長歌望海門晩山横北固落日照中原沙白鳥雙下天青江獨吞壯懐方激烈危坐欲騰鶱看山支郎構别業龎老逺塵寰偶到無言處來看江上山風篁元不整水鶴自飛還殘日漁樵盡柴門影獨閒讀孟浩然詩春水長蘭苕春鷗來復饒雲光欲到地江色澹相揺濁酒同漁父輕風動野袍峴山斜照裏歸去趂鳴橈同沈啓南吳門載酒泛月二首望望蒼茫裏閒雲度野田山空偏受月水濶不分天酒琖初侵夜星河半在船白袍江海上樗散自年年微茫風日暮歸鳥下青田暝色遥吞樹波容澹寫天豚魚不吹浪萍葉故迎船笑殺鴟夷子浮家不計年登越江城寄彭濟物憲副鼔角風初曙登樓倚望時春愁迷斷雁野色帶荒陴千里雲山夢十年江海詩兵戈阻前路還繫故人思有客草堂對湖水地僻有高情雨意開林色秋光泛菊英到船覓魚蟹有客過柴荆長日看山處相留几簟清曉起曉起風威急江城鼓亂撾沙明初報日樹凍半留花末路無騰蹋孤懐有歳華平生杜陵老爛醉是生涯癸酉六月望夜同施邦直棹舟西湖歴六橋抵望湖亭乘月登孤山拜和靖處士墓向曉南屏路相擕上釣䑳山根晴亦濕湖面夜難昏月色留吹笛鷗羣避洗樽來尋林處士地下有知言戎馬戎馬臨闗塞笳聲逺地哀朝廷聞選士道路困輸財星月天山動烽烟瀚海來安能有飛將坐掃陣雲開漁父野水平於席中流風力微江花迎日凈沙鳥背帆飛黄㡌為漁父青錢買釣磯只今鷗社裏投老願無違聽泉聽泉坐厓石來洗人間煩到面葉聲亂隔林雨意喧調高元自得道在却誰言歸路不知晩還看白鳥翻席上沈啓南先生限韻賦白荷花因柬錢士𢎞水部越女起新浴亭亭立晩凉波明弔清影露冷薦瑶觴與月還同調無人只自芳永言老南浦願不嫁東皇送杭東卿憲副入京對靣意不盡長風吹别襟江湖浮樹杪鸛鶴下秋隂羣盜還多難諸方慮已深治平望公等堯舜格君心夜起煮茶碎擘月團細分燈來夜缸瓦鐺然野竹石甕瀉秋江水火聲初戰旗槍勢已降月明猶在壁風雨打山牕謁孤山林和靖處士祠我識林居士角巾老不妨文章餘琬琰山水借聲光老鶴迎人立疎梅作意香誰言傍脩竹配食水仙王憶昔憶昔雲中士括囊秘命修於莵䭾醉影老劍伴清遊絶火毛三伐飲泉月一抔十年回首處天地隔滄洲晩霽晩來雨初霽煙火隔林微一徑牛羊入孤村桑柘稀長天下逺水積霧帶嵒扉月黒聞人語溪南種樹歸月夜同施彦器毛應奎二憲副三茅方丈對飲得饒字意極不成舞角巾醉裏豪菉葹悲道路山水自漁樵白月照斗酒長風吹鬢毛夜深催擊鉢一笑得詩饒月夜登臺和彭濟物韻凌虛有古榭入夜月同幽桂影吹欲散水光凝不流酒杯落吾手詩句破高秋見說盧敖在同追汗漫逰送彭濟物憲副赴闕多難還分手秋邊一劍雄青雲懸短夢白日照孤忠驛竹啼山鬼江汀卧晩楓兵戈猶在眼好奏未央宫夜坐柬錢員外士宏中夜不成寐屋梁落月空攬衣驚䑕散看劍炙燈紅吾道空山裏年華細雨中故人有傲吏相憶興還同對酒嵒石韜弓劍風塵混客身易消吳地酒不見隴山春失路無騰蹋供愁似衆人獨憐嵇叔夜何處可藏眞幽居雜興十首草堂連翠微一徑轉柴扉竹裏厨人散雨中春事稀蜂房爭自課花片覺全飛政愛蒲團好焚香了化機六籍聊遮眼高眠傍屋牙春來詩得計老去醉為家門映斜陽樹山開背郭花鄰翁閒有約相對話河車十日荒城雨開門草又新若無一杯酒辜負百年身澹澹春圍野青青山近人喜看江上影依舊白綸巾野次寡輪鞅春深漸輟耕幽禽隔樹小滋蔓上墻生蒲長青堪把桑空繭欲成自縁躭野趣不是愛逃名歸卧茒簷下讀書終愛貧鸎聲十年事草色滿城春道喪悲浮俗情高夢古人眼前君莫問我與酒盃親雞聲催旦暮歳月夢中移雲漢空回首溪山獨占竒買船同鶴載得句報僧知却笑南華子間看野馬馳柴門春雨裏野水明荒陂碧草看還長白袍閒自知短歌聊起舞扶醉强題詩元有林泉志歸來更不移清風生甕盎吾亦愛吾貧看竹雲連屐鈎簾雨映人梅花偶到座硯水動浮春意外渾無物青山共此身小艇初移棹揺揺進遠風晴江獻嶼碧老樹消春紅斗酒長吟處百年無事中釣竿如在手便好作漁翁睡起不自好出門望逺山碧雲回夕色老木澹秋顔道路從違裏菰蒲坐嘯間吾師白鷗鳥長日與同還贈别顧華玉謫全州桂嶺經行處泉聲日夜潺飛虵晴挂樹毒霧晝沉山去國鳴孤楫傳詩到百蠻栁侯讀書處遺像沅湘間江南道中去國烽烟異懷人涕泗滂九闗啼虎豹三月裹餱糧日晩漁人語雲回雁路長請泥吾豈敢晏坐恐埀堂鵝湖費閣老見訪山中作詩贈之天遠辭朝日江清一棹東艱危思欲濟留滯氣還雄水宿魚龍國帆連鸛鶴風便隨梅福去莫問國師公重遊江上寺重遊江上寺相對一樽開耒耜知天力東南息戰灰堞樓浮海動潮勢抱山來落日聞人語漁樵一徑回聞開化兵亂問訊吾廷介父子問訊南來客移家近向城長貧方學道多病更聞兵顧我蓬蒿質憐君江海情續盟定何日瓢笠祝融行費鵞湖閣老顧與成參議同訪有詩見遺依韻和答雨餘秋寺裏一徑轉松長上客同乘屐髙人獨據牀塔隂眠石壁鶴跡遍山房歸去猶餘興看鷗意不忘感興作詩久成祟身世困天弢夢斷心猶壯燈青首獨搔梨花三月暮春水一帆髙何處歸來好看山破白醪江城柬殷近夫沙上風煙異經時老客心遠天低故壘落日帶空林目極芳華晩愁縁野水深江城有嚴武猶可慰孤吟席間戲和近夫江上風煙好依依俗更敦故人有傲吏喚客共清樽覓句開梅閣投壺對竹根一春狂未了頭戴小烏巾對雪清晨寒威作倐爾失荒陂飢烏噪欲死老鶴光自竒斜斜全傍竹脉脉政宜詩西湖理釣艇憶得去年時避冦吳興山中二首日暮漁樵散山空河漢明柝聲悲永夜戎馬閉孤城去國美人盡感時黄葉生酒杯徒自好極目一霑纓露下蟲聲雜蓬門月色沉燈明人按劒風急虎行林南國兵戈滿中原涕淚深裋衣挽不及卧病北山岑簡邵國賢少司徒青鞵偶城市邂逅喜相投一笑滄江逺到門拄杖留人文望吾子天意老漁舟不盡風前興寒花卧晩幽寄山中相知世間果何意一事我來無碧海分琅菜青天夢白榆笑看驢背影又落華山圖欲語無人㑹月明猿自呼西湖十里山如拭西湖背郭流僧歸虹外雨雲抱水邊樓春事多逢醉歌聲半是愁獨憐垂釣者吾欲共滄洲同董子言陳用明沈天用僧古心晩凉擕榼湖上以老杜山青花欲然分韻得花字六橋尋勝處去去望中賒樹老秋連石湖酣晩映花山光酬野客詩意愛漁家歸路殘陽裏鏗鏗拄杖斜夜過王漢章留酌一笑眞良晤相看意氣同杯痕寒較淺暝色坐來空倒幘髙人醉焚香秀句工阿咸更清絶愛客似而翁月夜過凌時東角巾興自好愛月訪柴門幽事同吾子青山閣酒樽江風動髙樹野水明孤村欲問今宵意漁歌起釣䑳宿歸雲菴獨坐山中寺境閒眞意存瓦燈燃石壁松葉暗柴門夜久無羣動詩成偶自言上方鐘意早山月落前軒秋夜不寐造物終難料夜長耿不眠酒醒燈暈裏秋墮葉聲邊盆盎乾坤夢溪山藜莧緣平生陳正字死不受人憐沈啓南挽詞風流驚絶代投老有餘情海内求詩草圖中聽水聲人多憐蹇拙天亦愛聰明回首荒山道斜陽草樹平夜宴河漢近瑶席開簾空翠生金杯揺夜影畵燭剪春聲一笑藏鉤戲低回舞雪輕歡歌雜未歇澹月照三更送許天賚赴春試角巾快一識相對殘陽紅多路笑我拙收功與子同山青去鳥外春滿片帆中政恐釣竿手畵眉終未工劒得自昆吾北土花尚蝕紅歌魚志終俠斫地氣何雄寒日飛孤電晴空走白虹平生忠義在仗爾靖蠻戎晩晴信歩至城東草堂主人開樽留酌東風吹晩歩拄杖散閒身燕掠春隂薄鳩鳴桑葉新過君文杏館呼我謫仙人政有煙霞骨還知麋鹿親毗陵李太守禦賊戰格東西破孤城誓始終自揮朱雀幟衆擁紫髯公吳楚哀歌滿江湖控制雄為憐廵遠義湏愛晟瑊風休寧汊口十詠旗山有美神明地青山旗勢開連村看世胄繼代有賢才赤羽迎雲出翠華拂日來人家讀書處髙下見松梅鼓石平野山根出形如一鼓横何人費修琢真宰自生成苔剝青猶好雲深濕不鳴太平有樂部還擬獻承明筆峰山勢南來遠筆峰獨不羣煙嵐晴露頴草木碧成文人物千年秀道源百世聞夕陽重回首髙望入寒雲硯嶺一帶嶺横起渾如硯琢成咸池清露滴仙掌黒雲生元氣天應結人文世久明誅茒山麓下閉户著陶泓暘谷谷口日升處雲開萬里輝遥看峯影出漸覺露華稀地煖禽聲樂泉甘草木肥端明種松處百萬已成圍雲溪落日溪光淨閒來坐石磯因看異人跡猶見紫雲飛㟁坼楓根出沙寒石髪稀懐賢増感慨回首意都違龍山蜿蜒山脉好神物欲飛翔亂石蒼鱗動千松翠鬛長地形接閩越人物自梁唐山脚遺祠在題詩仰末光鳯林聞道東林竹當年有鳯鳴濕雲吹不散凉月亂還明疎見晩山色遥連茒舎清豈無逸士駕載酒寄髙情鄉約休陽萬山裏民物義相敦耕鑿猶前古詩書自一村應看風俗厚尚有典刑存遺訓追先哲年來德業温吟社續代開吟社佳時賸一遊思竒山改色興到鳥深愁大雅聲猶在黄初𣲖尚留太平風物好有句頌皇猷荆溪道中樹夾蒼厓立遥遥溪路微浪花迎棹尾山影上人衣飢鵲鳴將下頽雲凍不飛還尋舊逰處日暮漁樵稀幽居二首萬事歸來好幽居養性靈敎兒收藥裹留客話熊經投老丈人行生來處士星相過君莫問身世一魚舲自得窮通理幽居不誤身清流梳石髪遠霧着山巾竹上僧留偈庭前鶴近人科頭坐終日吾自愛吾真王方伯與時製深衣幅巾大帶絇履見遺小詩裁謝敎化尊方伯能令風俗敦人文今更煥吾道喜猶存居士香山社先生獨樂園興來風日好行傍栁花村永嘉王子揚見訪山中留酌樽酒歌聲發蓬門秋意深泉光浮野竹山氣濕空林一笑得吾子百年獨此心便期同隱操更喜有髙吟山寺對雪寒入山中寺今晨雪意逢清樽留客過野興對僧濃别渚迷鷗影深林印虎踪此時誰㑹我倚杖立髙松送吳希明送子長楊渡白雲歌未終江山情共别燈火夢還同一路黄梅雨半帆白鳥風波聲催棹急何處寄詩筒宜興吳克學雨中遠訪予于吳山一宿而别詠此送之故人共短席相對酒杯深一宿蘧廬夢百年翰墨心雨疎分薄曙蟲響起空林後夜成相憶月明何處砧僧明秀東林別業結屋東林下市鏖㢠不聞疎花寒照雨老樹暝巢雲摩詰元非病懶殘不忌葷茒簷兀坐處萬物自芸芸石林亂石生寒靄殘林帶晩曦松凉供睡穏山靜與詩宜入洞隨猿跡登崕割蜜脾朅來天壤内此地可棲遲同凌時東吳介夫僧古心逰虎跑寺泉頭分韻得空字長日尋幽處穿林興不窮把杯秋寺裏得句野泉中山路晴吹葉石梁晩度風有僧同杖屨更洗世情空失鶴六首有引余蓄一鶴一夕開籠調舞忽爾髙逝長望不還時松房夜寂風月清烱獨引歩顧影誦唐人想伊只在秋江上之句因用首尾作詩六首付童子長歌以招之只在秋江上孤音何處聞夢回千里月愁入萬山雲欲賦招難返長憐思不羣此時還憶汝書寄武夷君只在秋江上連宵信不通忽看雲外影漫擬頂間紅樂府音猶是山家籠已空此時還憶汝學舞小庭中只在秋江上長吟首重搔避烟茶已熟窺户月初髙山角聞孤笛湖隂夢小舠此時還憶汝把酒興空豪只在秋江上髙飛竟不還君應憐逺漢吾豈戀區寰雲冷難成夢月明疑扣闗此時還憶汝何處訪蓬山只在秋江上孤蹤竟所之花間扶杖處竹外聽泉時野客來𤣥圃山僧寄紫芝此時還憶汝伴我夜吟詩只在秋江上烟霞㡬萬重堦前留墮羽苔面想行蹤雲影忽傍水月明猶在松此時還憶汝跨我出樊籠西爽亭㑹别周叅政楊顧二叅議對酒山亭上清秋思更豪輕鷗動江色片雨帶林皐興逐王司馬詩當何水曹分擕聊一笑日暮上漁舠寄越中諸友自别西湖上逃名人不聞飯甘黄獨味身在野鷗羣俗病難相惱靜居已策勲何時還一笑採秀入閒雲贈鄭師凖有引浦江義門鄭師凖訪予山中坐次因與談先世同居之義鄭氏自宋建炎初至我朝居已十餘世厯三百餘年合數千指而食守宗法不墜宋元二史具載孝義傳中而我朝猶以孝義顯被殊恩之盛然則舉斯世之大而義之間見者僅僅若是是可嘉也亦重可歎也作詩贈之義居聞鄭氏十世浦江濵國有張公藝人傳李自倫宗文今更見俗化喜猶淳海内樊籬共寧無感激人虎丘慧上人山房占勝景相於僧閒水竹居牕幽滋蘚暈樹老帶蟲書石鼎秋聮句溪園夜剪𬞞買山錢可借許我築茒廬獨徃無媒幽徑迥笑語領東風遠燒攙新緑寒花動小紅野情藜杖底詩句酒杯中一路春相候何人識化工燕都張子言訪山中有客自高格入山從我遊衣裳上雲色几簟枕泉流嵇叔遠世味山公得酒儔柴門近湖水還可到漁舟春日吳門和李獻吉見寄二首春水動幽興江行人跡稀青楓隨浦斷遠鴈與雲歸過雨花經眼停舟山近衣長吟愁落日霞外看餘暉漫艤吳門棹因成極勝遊野吟峯影出林卧草光流帆靣過江鳥雲隂開晩洲狂歌聊自得隨地覓巖丘石亭石亭圍野色晏坐長髙情細竹通幽澗呼兒洗玊罌蒼蒼松雨墮冉冉島雲生掃石題詩句長留眞隱名惠山寺髙卧山中寺瞢騰過午鐘身間隨物化意到與天通松閣雲光入山泉雨氣空焚香憶摩詰興味頗相同同顧與成叅議過蓉湖别墅分韻得禾字龍山斜帶郭樹宻野凉多湖氣熏晴日雲光凈緑禾茶𤓰隨地覓村徑與君過佇愛幽居晩兒童竹裏歌遊道塲山伏虎昔年寺塔留雷半焚我來白日靜鐘落青山聞亂石開雲氣晴池散鳥羣遲回興不盡林葉落紛紛雨晴曉起雨初霽輕風到野袍日迎山氣盡天入鸛羣髙出澗喜新漲擕僧同小舠欲留還自去詩意動林臯錢員外施藥濟人逺近風動作詩戲贈濟世韓康伯辭官陶隱居花前開藥裹月下檢方書道骨時應長塵縁漸破除髙風動城郭人跡滿門閭寄顧台州華玉使君有道氣為政亦山中坐見桃花色青林度逺風才堪一世用官與衆人同飢食莤溪橡長歌興不窮遊龍井山石磴攀蘿上天風倚杖吟鐘鳴山意動泉静樹光深白日觀雲物清樽坐石林歸來興更好纎月映孤岑晩凉獨坐湖上荷花盛開薄晩西湖上花開還自憐風回香冉冉鷗泛葉田田雲色晴移水月明凈放船夜凉興更好獨坐釣絲邉鄭繼之地官久不過湖上奉簡怪爾狂吟客不過湖水濵寧遭官長罵莫得野人嗔雲外烏藤杖水邊白鷺巾相看只自好空送月華新同孟僉事望之登虎丘山停舟倚暮色開琖對江濆山㢠朱甍出鐘鳴碧殿聞林花交野㟁石壁動春雲落日狂歌客登臨興不羣東郭草堂和王濟之閣老韻草堂臨野水苔積路難分枕簟虚山月琴尊度海雲㗳然眞得道隱矣不須文長日少人跡門開鸛鶴羣蘭落日天風動空山蘭葉芳瀟瀟湘水濶冉冉楚雲長獨抱幽人操空懐王者香隔江費褰采嵗暮永相望贈黄得之二首海内談詩早聲名髙適齊風塵同佇望衣食各卑棲落日雙鵰急空林孤兕啼愁聞更出狩校獵羽林西我愛黄江夏雲山夙有期風流懐上世瀟洒有清詩笑拾滄江月行歌青桂枝嵇康得石髓王烈許從師聞郡使者救水荒地入黿鼉窟天連鵞鸛羣君心時注念使節日憂勤滄海流雲氣青山捲浪文歳功猶足望歌頌動江濆簡程確齋有美人中傑名應入邵評易傳殷末世文尚漢西京樽酒觀羣化衣冠異俗情率溪有長雚釣取北溟鯨海鹽陳用明朱元素僧明秀見訪山中酒次作詩贈之可人費招挽今喜過蓬門黄烏坐中午青山意外春詩新聮石鼎興逸逐清樽明日還相憶來歌白鷺巾題孫道甫東園巻小闢東園地間來樂事宜幽懷流動處好鳥忽鳴時灌藥引清沼護花編短籬主人足高興嵇吕共襟期遊勝果寺偶過江上寺政遇遠禪師泉石闗幽興雲山進酒巵小樓圍晏坐細雨好尋詩隔塢茶煙起燒殘藤一枝茒屋清溪上茒屋清溪上漁歌入座聞水光偏映竹釣石自生雲地近青藜杖身隨白鳥羣此中有眞趣長日少塵紛夀楊氏母九十阿母逢初度北堂風日晴花光動酒影玉笛轉春聲女閣清樽在華筵白髪明膝前供笑語願祝到雲礽送友人北上扣舷歌小海判袂送君行秋入風雲壯鵰盤原野晴山迎揚子渡潮語廣陵城還憶西湖上漁歌載酒觥題孫以德竹窻巻窻前立蒼壁坐對時蕭森秋影雲垂地夜聲風滿林寒吹拄杖濕青入酒杯深湘客渺何許遥聞飛珮吟贈友人之梁宋壯志輕離别鏤刀拂雪明他方正多事中原誰請纓彩裘違故國琴筑歇芳聲勸爾一杯酒出門空復情石川子夜半相訪境静人羣絶夢回庭影空打門走狂客半夜驚山翁烏鵲霜林月堞樓皷角風更湏笑疎懶脫幘坐髙松宜軒為吳孟端賦兄弟古所愛君家義仁行青春池草夢白日棣華明潁上荀文若吳中陸士衡詩書有家學不負竹洲名次韻寄祝維貞員外歸來光範門書策不須論白日自幽事清泉在小園鳩鳴開竹閣月曉過梅村鄰父時時㑹壺觴笑語温孫萬春挽詞西風起天末驚失少微星問字人初去燃藜火尚青竟眠藤樹樾難起草堂靈偶過西州路令人涕泗零觀魚歩屧石池上觀魚坐短蒲翻萍銀撥刺吹浪雪糢糊沙白雲光凈日斜島嶼孤濠梁相對處吾亦偶忘吾浩嘯浩嘯竹林間來過湖水灣晩花餘色凈雙鶴照衣閒用拙思深隱時危慚獨還狂歌聊自得隨意弄潺湲發漕河初日浮髙樹清鷗散淺沙挂帆湖水上聞笛野漁家㟁坼菰蒲合雲迷山郭斜芳洲動幽興自起采蘋花歳暮身世馬虺隤索居不用媒恩多貧曝日吟苦飢鳴雷凍鵲遲遲下晴梅鼎鼎開詩書娛此夕吾意老山隈春日王氏池亭一首别浦漁歌近臨流水檻開主人時杖屨斜日在莓苔沙凈新篁出亭幽羣鳥來習池風景異喜有葛强陪大善寺贈惠上人訪客溪邊寺惠休解愛才髙吟時野興小坐引春杯翠壁雲光薄青林雨氣開㑹當忘物我相對碧山隈過黄勉之明水草堂去去草堂逺懷人藜杖過青林散山靄翠壁吹江波竹裏鳩聲切吟邊野興多相看皆道氣白日卧雲蘿同吾進士謹遊陳遂初湖上草堂野徑山光裏草堂湖水傍開樽臨絶壁㟁幘俯滄浪虚渚秋光淨髙雲晩木凉同遊得朋舊歌罷興偏長飲惠憲副北屏别墅對酒清溪上聞歌杳靄間竹光酣晩日雲影動秋山好鳥移時下名園盡日閒主人愛瀟散野客不知還寄鄭繼之少谷平生友青雲半載離豈忘吳地客不寄鴈門詩嘯傲定何日經綸須此時後期解朱紱同飽九莖芝訪許進士台仲九杞山中二首山水經年别樽罍十日留柴門沙月動木榻海雲流同愛名山隱難忘帝國憂何時解朱紱一笑共滄洲下榻山中夜論交海上村百年同意氣雙淚獨乾坤木葉風江亂秋燈霧樹昏滄洲終自好白首釣魚䑳溪堂落成鄰漁以篛笠草蓑見遺卜築苕溪上幽居景自賒杜陵今避地龎老喜移家石榻青霞滿山樽白月斜鄰翁惠釣具雲水足生涯尚書許公挽詞四海哀良弼百年憶老成西風吹畵翣落月照丹旌相紱懷當日戎冠識舊名我為天下念回首一沾纓南軒下梅數花初放對酒盡日春日南軒下數花梅已香疎枝通月色淡影接溪光忽忽小詩就悠悠孤興長㑹湏憐獨立對坐領年芳陸氏永思堂堂在溪流上門開雲樹中青禽廻野日黄葉引山風何日烟霞地來尋桑苧翁把酒坐終夕回首茨門東同凌時東邵文化沈邦魁飲戴山大石上載酒問山寺尋幽過遠林殘霞依水凈新月隱杯深坐久頻移石歌長得賞心青春元自好歸櫂有高吟哭吾惟可前年近夫死今日汝云亡泉石音容外乾坤涕淚傍才名悲造物星漢失文章吾道竟誰語寥寥孤夢長漫筆用姑蘇文秀才韻翛然脫塵累浩汗竟何之千里雲山夢十年江海詩魚龍酣白日鴻鵠自清時著眼觀羣化長歌酒一巵秋夜不寐蟲聲破孤寐起坐轉蕭騷白露星河近西風鴈背髙江山泣吏卒天地入旌旄老眼蒼茫外長吟首獨搔夜雨寒柝聲初急殘燈燄不修長吟聞夜雨獨客卧江樓節物東山念朝廷西鄙憂驚風振叢薄迷鴈失灘洲枕上漫爾成詩枕上三更夢愁多記不分長天低野樹茒屋帶星文月色萬里靜江聲永夜聞武夷猶汗漫宗社想諸君題愛日樓髙樓奉親處日色滿簷牙夀祝靈椿樹詩歌丹棘花緑樽侑几席白髪恱年華春靄階庭内蘭孫又茁芽脩竹亭脩竹何年種虛亭散翠隂清風自長夏赤日避髙林裊裊山雲淨娟娟溪霧深地偏人不到來往動高吟太白山人漫藁巻四
