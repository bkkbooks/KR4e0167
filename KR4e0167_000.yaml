body:
  text: 太白山人漫藁目録别集類五明巻一古樂府巻二五言古巻三七言古巻四五言律巻五五言排律巻六七言律巻七五言絶巻八六言詩七言絶臣等謹案太白山人漫稿八巻明孫一元撰一元字太初自稱秦人或曰安化王孫也嘗棲太白之巔故稱太白山人又嘗西入華南入衡東登岱又南入吳與劉麟吳珫陸崑龍霓稱苕溪五隠晩而就婚施氏遂卒于吳興麟為文以表其墓一元才地超軼論者至以王猛之流擬之其所為詩排奡凌厲往往多悲壯激越之音讀之極伉健可喜朱彞尊至謂其瓣香在黄庭堅持論雖不免稍過然當秦聲競響之日而能矯然拔俗如此亦可謂獨行其志者矣明史藝文志載一元太白山人稿五巻此本為崇禎中湖州周伯仁所刻凡八巻葢據吳興張氏本及陽湖本而合輯之者原録于八巻末尚標有補遺若干首而巻内無之葢當時有志搜訪而未得也閔元衢歐餘漫録載一元逸詩有送許相卿詩一首見許氏譜題王伯雨園亭二首見烏青鎮志和吳甘泉詩四首重逰一首君馬黄一首見真蹟飲馬長城窟一首見盧志菴所録續于紀宣符家得十四首又稱鮑稚􅌢家有其詩抄約千餘首則其散佚亦多矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀刻太白山人漫藁題辭孫太初先生以超軼絶世之才遊半天下卒卜居於吾湖攷其年僅三十有七而當時之偉人傑士無不折節下先生若得交於先生為幸者没之日各分任其平生所屬使無復有遺憾非有一段不朽者沁入人心奚以至於斯余生也晩不獲炙先生但見湖之先薦紳大夫及耆舊之士每嘖嘖稱先生為畸人至得其詩藁中片紙隻字無不寳為𢎞璧天球也者當年諸刻惟余外家張氏本稱善而歳久業荒悉以飽蟻䑕之腹有心者傷之長兒仁偶過舅氏從零落中見其僅存者什之一因覓其原本又從友人處得陽湖本合為補葺并傳誌敘言彚成一集以流布海内俾海内之慕先生者知先生之詩瓢猶有在而當時劉元瑞鄭少谷李空同諸君子所以表章先生者令千載如見云藁曰太白山人存舊志也崇禎已夘春日吳興周中度身為父題太白山人漫藁序太白山人漫藁者吾友孫太初所為詩也夫曰漫者觸而成聲無謂有謂之云也太初闗西豪傑也束髪入太白山為山人繼入終南汎觀恒岱遵龜䝉慕宣聖遺韻止於鄒魯之邦久之踰江淮下吳越鶡冠布袍獨立於萬象之表志孑如也夫髙蹤遠影者顧以世為不足為乎及讀其詩皆悲壯竒崛感激奮發而卒澤以中和如神龍在淵變化不測得時而興乘雲雷而雨天下噫是豈忘情遁性為犂輿耒耜者倫乎或曰太初離親戚去墳墓逺遊于方之外與名教或不相䝉者是何言哉孔子曰丘也東西南北人也復欲居九夷嚴子陵去齊適越管㓜安徙於遼東孫明復隱居於太山之陽邵康節去家入洛四十而後娶古之賢達流寓於外要必有所為而安焉者獨太初爾邪或曰吳越之人右文人易致名譽太初操觚飾智揚揚然為髙意有終南之㨗者夫以太初之才稍自抑以應今之世何徃弗達顧甘心寂寥卒其世以餂無端功名邪吾嘗與太初乘月汎洞庭浩歌漁父傲睨一世若無少芥蔕於其懷又嘗與卧西湖之上見其息深深時乎天長時乎地久要固有道者吾聞無欲而後可應世今之應世者可勝議哉漫藁凡若干余為之序以傳藁而曰漫則固傳也太初不與也正德戊寅歳春二月少谷山人晉安鄭善夫書余序太初漫藁成太初曰子眞知我者又明年庚辰而太初死遺命以漫藁必付余余歸弔其廬撫其孤擕其藁至杭梓而行之凡與太初遊者如杭人許台仲陳遂初高世美湖人施邦直沈仁伯徽人程世大孫道甫戴仲良率來集事於乎使太初復生諸君當不愧其平生之言乎是年秋七月望善夫志太白山人漫藁序太白山人漫藁成予友少谷子以示予於勝果寺俾序之序曰吾讀太白山人詩而知吾越山水之盛也吾聞山水能生竒人矣太白山人秦人也入吾越時未有詩名久而漸張公卿方伯連帥之尊輿皁優伎之賤無弗知有山人者吾越山水之助也夫寓吾越者多矣而何獨一太白山人乃得其助蓋山人以其雄壯渾厚之資肆之以詭怪佳麗之觀若甘和白采之合美故其詩往往為人所傳而予固知其必傳于後也夫既能生竒人矣而竒人自外至者復能留焉留之者與生之者等也故因以知吾越山水之盛又曰太白山人江湖間不可無也漫藁之刻太白山人不可無也有太白山人然後重江湖有漫藁然後太白山人重少谷子之意也今之神山人者曰山人長髯白靣𤣥談静養决非凡骨眞仙或可成也器山人者曰山人宏才廣識知兵曉吏事使之用世當若古之王猛者流而惜其流落不偶也有鄙山人者曰山人豈無父母妻子親戚墳墓而乃溺情忘反也山人願學林逋矣而何卒取少艾以自汚也棠陵子曰太白山人不可鄙也神之者誣矣器之者或未必然也江湖之間不可無也予嘗遇山人於姑蘇之臺竊欲友之而吏事牽矣山人於少谷子盡讀交遊所贈而曰獨心伏于崑山予嘗感其知而再㑹無由矣然有待也蓋髙明之士一變必殊絶吾及其變而友之當有得矣嗚呼已焉哉又曰太白山人已矣能使少谷子收其藁以傳又能使劉元瑞諸君子治其後事予友吾惟可崛邁之士也而於山人毎心伏焉殷近夫余畏也而畏山人皆有忘形刎頸之意嗚呼山人可謂得豪傑之心者矣夫用世者在先得豪傑之心然則太白山人雖謂之用世之才可也正徳十五年閏八月二十日棠陵方豪漫書
